<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liar's Deck 吹牛王牌</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Microsoft JhengHei', sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}
.container {
  max-width: 520px;
  margin: 0 auto;
  padding: 10px 12px 140px;
  min-height: 100vh;
  position: relative;
}
h1 {
  text-align: center;
  font-size: 28px;
  margin-bottom: 4px;
  background: linear-gradient(90deg, #ffd700, #ff6b6b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
}
.subtitle {
  text-align: center;
  font-size: 12px;
  color: #8899aa;
  margin-bottom: 12px;
}

/* --- Opponents --- */
.opponents {
  display: flex;
  justify-content: space-around;
  margin-bottom: 10px;
  gap: 8px;
}
.opponent {
  background: rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 10px 8px;
  text-align: center;
  flex: 1;
  position: relative;
  transition: all 0.3s;
  border: 2px solid transparent;
}
.opponent.active-turn {
  border-color: #ffd700;
  box-shadow: 0 0 18px rgba(255,215,0,0.35);
}
.opponent.hit {
  animation: hitShake 0.5s ease;
  background: rgba(255,50,50,0.35);
}
.opponent-name {
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 4px;
}
.opponent-hp {
  display: flex;
  justify-content: center;
  gap: 3px;
  margin-bottom: 4px;
}
.hp-heart {
  font-size: 14px;
  transition: all 0.3s;
}
.hp-heart.lost {
  opacity: 0.2;
  filter: grayscale(1);
}
.opponent-cards-info {
  font-size: 11px;
  color: #aabbcc;
}
.opponent-claim {
  font-size: 11px;
  color: #ffd700;
  margin-top: 4px;
  min-height: 16px;
}

/* --- Game Info --- */
.game-info {
  background: rgba(255,215,0,0.12);
  border: 1px solid rgba(255,215,0,0.35);
  border-radius: 14px;
  padding: 12px;
  text-align: center;
  margin-bottom: 12px;
}
.challenge-type {
  font-size: 18px;
  font-weight: bold;
}
.challenge-type span {
  font-size: 24px;
  vertical-align: middle;
}
.round-info {
  font-size: 12px;
  color: #99aabb;
  margin-top: 4px;
}

/* --- Play Area --- */
.play-area {
  background: rgba(0,0,0,0.25);
  border-radius: 16px;
  padding: 14px;
  min-height: 110px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  position: relative;
}
.play-cards {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}
.play-card {
  width: 48px;
  height: 68px;
  background: linear-gradient(145deg, #c62828, #b71c1c);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: #ffd700;
  border: 2px solid #e53935;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.4);
  animation: dealCard 0.35s ease-out;
}
.play-card.revealed {
  background: #fff;
  border-color: #ccc;
  flex-direction: column;
}
.play-card.revealed .rank {
  font-size: 18px;
  font-weight: bold;
}
.play-card.revealed .suit {
  font-size: 14px;
}
.play-card.revealed.is-joker {
  background: linear-gradient(135deg, #ff6f00, #ff8f00);
  color: #fff;
  border-color: #ff6f00;
}
.play-claim {
  font-size: 13px;
  color: #ffd700;
  margin-top: 10px;
}
.play-empty {
  color: #556677;
  font-size: 13px;
}

/* --- Player Hand --- */
.player-section {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 12px;
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 520px;
  z-index: 10;
  border-top: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
}
.player-label {
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.hand {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  min-height: 80px;
  align-items: center;
}
.card {
  width: 56px;
  height: 80px;
  background: linear-gradient(145deg, #f5f5f5, #e0e0e0);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  border: 2px solid #bbb;
  position: relative;
}
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}
.card.selected {
  transform: translateY(-14px);
  border-color: #ffd700;
  box-shadow: 0 0 15px rgba(255,215,0,0.5);
}
.card.disabled {
  opacity: 0.5;
  pointer-events: none;
}
.card .rank {
  font-size: 20px;
  font-weight: bold;
}
.card .suit {
  font-size: 16px;
}
.card.is-joker {
  background: linear-gradient(135deg, #ff6f00, #e65100);
  color: #fff;
  border-color: #ff8f00;
}
.card.is-joker .rank { font-size: 14px; }
.card.red { color: #c62828; }
.card.black { color: #263238; }

/* --- Controls --- */
.controls {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  justify-content: center;
}
.btn {
  padding: 10px 22px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn:active { transform: scale(0.95); }
.btn-play {
  background: linear-gradient(135deg, #43a047, #2e7d32);
  color: #fff;
}
.btn-challenge {
  background: linear-gradient(135deg, #e53935, #c62828);
  color: #fff;
}
.btn:disabled {
  opacity: 0.4;
  pointer-events: none;
}
.btn-start {
  background: linear-gradient(135deg, #ffd700, #ff8f00);
  color: #1a1a2e;
  padding: 14px 36px;
  font-size: 18px;
}

/* --- Message Log --- */
.log {
  margin-bottom: 12px;
  max-height: 100px;
  overflow-y: auto;
  font-size: 12px;
  color: #99aabb;
  padding: 6px;
}
.log p {
  margin-bottom: 3px;
  line-height: 1.4;
}
.log .damage { color: #ff5252; }
.log .info { color: #64b5f6; }
.log .claim { color: #ffd700; }

/* --- Game Over --- */
.game-over {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  animation: fadeIn 0.5s ease;
}
.game-over.show { display: flex; }
.game-over h2 {
  font-size: 36px;
  margin-bottom: 10px;
}
.game-over .winner { color: #ffd700; }
.game-over .loser { color: #ff5252; }

/* --- Animations --- */
@keyframes dealCard {
  from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
  to { transform: scale(1) rotate(0); opacity: 1; }
}
@keyframes hitShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
.btn-challenge { animation: pulse 1.2s infinite; }

/* Scrollbar */
.log::-webkit-scrollbar { width: 4px; }
.log::-webkit-scrollbar-thumb { background: #445; border-radius: 2px; }
</style>
</head>
<body>
<div class="container">
  <h1>🃏 Liar's Deck</h1>
  <div class="subtitle">4人吹牛遊戲 ｜ 3顆❤ 活到最后</div>

  <div class="opponents" id="opponents"></div>

  <div class="game-info">
    <div class="challenge-type" id="challengeType"></div>
    <div class="round-info" id="roundInfo"></div>
  </div>

  <div class="play-area" id="playArea">
    <div class="play-empty" id="playEmpty">等待第一手出牌...</div>
  </div>

  <div class="log" id="log"></div>

  <div class="player-section" id="playerSection">
    <div class="player-label">
      <span>👤 你 <span id="playerCardCount"></span></span>
      <div class="opponent-hp" id="playerHp"></div>
    </div>
    <div class="hand" id="hand"></div>
    <div class="controls" id="controls">
      <button class="btn btn-play" id="btnPlay" disabled>出牌 (0)</button>
      <button class="btn btn-challenge" id="btnChallenge" style="display:none">🚨 質疑！</button>
    </div>
  </div>
</div>

<div class="game-over" id="gameOver">
  <h2 id="gameOverTitle"></h2>
  <p id="gameOverMsg" style="font-size:16px;margin-bottom:20px;"></p>
  <button class="btn btn-start" onclick="startGame()">🔄 再來一局</button>
</div>

<script>
const RANKS = ['Q', 'K', 'A'];
const SUITS = ['♠', '♥', '♣', '♦'];
const MAX_HP = 3;
const HAND_SIZE = 3;
const MAX_PLAY = 3;

let deck = [], players = [], hands = [];
let challengeRank = '';
let currentPlay = null; // { player, cards, claim }
let selectedCards = new Set();
let roundNumber = 0;
let turnQueue = []; // AI turns to process
let gameActive = false;
let playerTurn = false;

// ---- Deck ----
function createDeck() {
  let d = [];
  for (const r of RANKS)
    for (const s of SUITS)
      d.push({ rank: r, suit: s, isJoker: false });
  d.push({ rank: 'Joker', suit: '🌟', isJoker: true });
  d.push({ rank: 'Joker', suit: '🌟', isJoker: true });
  return d;
}

function shuffle(d) {
  for (let i = d.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [d[i], d[j]] = [d[j], d[i]];
  }
  return d;
}

// ---- Game Init ----
function startGame() {
  document.getElementById('gameOver').classList.remove('show');
  deck = shuffle(createDeck());
  players = [
    { name: '你', hp: MAX_HP, isHuman: true },
    { name: 'Alice', hp: MAX_HP, isHuman: false },
    { name: 'Bob', hp: MAX_HP, isHuman: false },
    { name: 'Charlie', hp: MAX_HP, isHuman: false }
  ];
  hands = [[], [], [], []];
  selectedCards.clear();
  roundNumber = 0;
  currentPlay = null;
  gameActive = true;
  playerTurn = false;

  // Deal 3 to each (12 cards), 2 left in deck
  for (let i = 0; i < HAND_SIZE; i++)
    for (let p = 0; p < 4; p++)
      hands[p].push(deck.pop());

  addLog('🎮 遊戲開始！每人發 ' + HAND_SIZE + ' 張牌', 'info');
  startNewRound();
}

function startNewRound() {
  if (!gameActive) return;
  roundNumber++;
  currentPlay = null;
  selectedCards.clear();
  challengeRank = RANKS[Math.floor(Math.random() * RANKS.length)];

  // Refill hands from deck
  for (let p = 0; p < 4; p++) {
    while (hands[p].length < HAND_SIZE && deck.length > 0) {
      hands[p].push(deck.pop());
    }
  }

  document.getElementById('challengeType').innerHTML =
    `本輪真牌：<span>${challengeRank}</span>`;
  document.getElementById('roundInfo').textContent =
    `第 ${roundNumber} 輪 ｜ 牌堆剩 ${deck.length} 張`;

  addLog(`━━━ 第${roundNumber}輪：真牌是 ${challengeRank} ━━━`, 'info');
  document.getElementById('playEmpty').style.display = '';
  document.getElementById('playArea').querySelector('.play-cards')?.remove();
  document.getElementById('playArea').querySelector('.play-claim')?.remove();

  render();

  // Human goes first each round
  playerTurn = true;
  document.getElementById('btnChallenge').style.display = 'none';
  addLog('輪到你了！請出牌', 'info');
  render();
}

// ---- Helpers ----
function cardName(c) {
  return c.isJoker ? '🃏Joker' : c.rank + c.suit;
}
function nextPlayer(p) { return (p + 1) % 4; }

function countRankInHand(p, rank) {
  return hands[p].filter(c => c.rank === rank || c.isJoker).length;
}

function isTruthCard(c, rank) {
  return c.isJoker || c.rank === rank;
}

// ---- Player Actions ----
function toggleCard(idx) {
  if (!playerTurn || !gameActive) return;
  if (selectedCards.has(idx)) {
    selectedCards.delete(idx);
  } else if (selectedCards.size < MAX_PLAY) {
    selectedCards.add(idx);
  }
  render();
}

function playerPlay() {
  if (!playerTurn || selectedCards.size === 0) return;
  const cards = [...selectedCards].map(i => hands[0][i]);
  const claim = challengeRank;

  currentPlay = { player: 0, cards, claim };

  // Remove from hand (reverse order to preserve indices)
  [...selectedCards].sort((a,b) => b-a).forEach(i => hands[0].splice(i, 1));
  selectedCards.clear();
  playerTurn = false;

  addLog(`👤 你出了 ${cards.length} 張牌，聲稱是 ${claim}`, 'claim');
  addLog(`  → ${cards.map(cardName).join(', ')}`, '');

  render();

  // Pass to next AI
  setTimeout(() => processNextAI(1), 800);
}

function playerChallenge() {
  if (!playerTurn || !currentPlay || currentPlay.player === 0) return;
  resolveChallenge(0, currentPlay.player);
}

// ---- AI Logic ----
function processNextAI(fromPlayer) {
  if (!gameActive) return;

  const p = fromPlayer;

  // Check if all non-liar players are alive
  const alive = players.filter((pl, i) => pl.hp > 0);
  if (alive.length <= 1 && gameActive) {
    endGame();
    return;
  }

  // If this player is dead, skip
  if (players[p].hp <= 0) {
    const next = nextPlayer(p);
    // If we've gone full circle, start new round
    if (currentPlay === null || next === 0) {
      // Check if we should start new round
      if (currentPlay !== null && next === 0) {
        // Back to human, give them challenge option
        playerTurn = true;
        document.getElementById('btnChallenge').style.display = '';
        render();
        return;
      }
      startNewRound();
      return;
    }
    setTimeout(() => processNextAI(next), 300);
    return;
  }

  // AI decides: challenge or play
  const decision = aiDecide(p);

  if (decision === 'challenge') {
    resolveChallenge(p, currentPlay.player);
  } else {
    // Play cards
    const cards = decision.cards;
    const claim = challengeRank;

    currentPlay = { player: p, cards, claim };

    // Remove from hand
    for (const c of cards) {
      const idx = hands[p].findIndex(h => h === c);
      if (idx >= 0) hands[p].splice(idx, 1);
    }

    addLog(`🤖 ${players[p].name} 出了 ${cards.length} 張牌，聲稱是 ${claim}`, 'claim');
    render();

    const next = nextPlayer(p);

    // If next is human, give them the turn
    if (next === 0) {
      playerTurn = true;
      document.getElementById('btnChallenge').style.display = '';
      render();
      return;
    }

    // Otherwise continue to next AI
    setTimeout(() => processNextAI(next), 1000);
  }
}

function aiDecide(p) {
  // If no play yet (shouldn't happen for AI), must play
  if (!currentPlay) {
    return { action: 'play', cards: aiChooseCards(p, true) };
  }

  // Calculate lie probability
  const numPlayed = currentPlay.cards.length;
  const held = countRankInHand(p, challengeRank);
  const possible = Math.min(numPlayed, RANKS.length * SUITS.length + 2 - held);
  const lieProb = numPlayed > 2 ? 0.75 : (numPlayed === 2 ? 0.5 : 0.3);
  const adjusted = Math.min(0.9, lieProb + held * 0.1);

  // Challenge if suspicious
  if (Math.random() < adjusted) {
    return 'challenge';
  }

  // Otherwise play cards
  return { action: 'play', cards: aiChooseCards(p) };
}

function aiChooseCards(p, mustPlay) {
  const hand = hands[p];
  const matching = hand.filter(c => isTruthCard(c, challengeRank));
  const bluff = Math.random() < 0.25 && matching.length > 0 && hand.length > 1;

  if (matching.length > 0 && !bluff) {
    const count = Math.min(MAX_PLAY, matching.length, 1 + Math.floor(Math.random() * 2));
    const chosen = matching.slice(0, count);
    return chosen.length > 0 ? chosen : [hand[0]];
  }

  // Bluff: play non-matching
  const nonMatching = hand.filter(c => !isTruthCard(c, challengeRank));
  if (nonMatching.length > 0) {
    const count = Math.min(MAX_PLAY, nonMatching.length);
    return nonMatching.slice(0, count);
  }

  // Must play truth
  if (matching.length > 0) return [matching[0]];

  // Only jokers left
  return hand.length > 0 ? [hand[0]] : [];
}

// ---- Challenge Resolution ----
function resolveChallenge(challengerIdx, liarIdx) {
  const play = currentPlay;
  if (!play) return;

  const allTruth = play.cards.every(c => isTruthCard(c, play.claim));

  if (allTruth) {
    // Challenge failed -> challenger takes damage
    players[challengerIdx].hp--;
    addLog(`🚨 ${players[challengerIdx].name} 質疑失敗！開牌：${play.cards.map(cardName).join(', ')} ✅ 全是 ${play.claim}！`, 'damage');
    addLog(`💔 ${players[challengerIdx].name} 扣 1 ❤️ (剩 ${players[challengerIdx].hp})`, 'damage');
    showHitEffect(challengerIdx);
  } else {
    // Challenge success -> liar takes damage
    players[liarIdx].hp--;
    addLog(`🚨 ${players[challengerIdx].name} 質疑成功！開牌：${play.cards.map(cardName).join(', ')} ❌ 不是 ${play.claim}！`, 'damage');
    addLog(`💔 ${players[liarIdx].name} 扣 1 ❤️ (剩 ${players[liarIdx].hp})`, 'damage');
    showHitEffect(liarIdx);
  }

  currentPlay = null;
  render();

  // Check game over
  if (checkGameOver()) return;

  // Start new round after delay
  setTimeout(() => {
    if (gameActive) startNewRound();
  }, 1500);
}

function showHitEffect(pIdx) {
  setTimeout(() => {
    const el = pIdx === 0
      ? document.querySelector('.player-section')
      : document.querySelectorAll('.opponent')[pIdx - 1];
    if (el) {
      el.classList.add('hit');
      setTimeout(() => el.classList.remove('hit'), 600);
    }
  }, 100);
}

function checkGameOver() {
  const eliminated = players.filter(p => p.hp <= 0);
  const alive = players.filter(p => p.hp > 0);

  if (players[0].hp <= 0) {
    gameActive = false;
    showGameOver(false);
    return true;
  }

  if (alive.length === 1 && alive[0] === players[0]) {
    gameActive = false;
    showGameOver(true);
    return true;
  }

  if (alive.length === 1) {
    gameActive = false;
    showGameOver(false);
    return true;
  }

  return false;
}

function showGameOver(playerWon) {
  const overlay = document.getElementById('gameOver');
  const title = document.getElementById('gameOverTitle');
  const msg = document.getElementById('gameOverMsg');

  if (playerWon) {
    title.innerHTML = '<span class="winner">🏆 你贏了！</span>';
    msg.textContent = '恭喜！你是最後的贏家！';
  } else {
    const winner = players.find(p => p.hp > 0);
    title.innerHTML = '<span class="loser">💀 你輸了！</span>';
    msg.textContent = winner ? `${winner.name} 獲勝！` : '遊戲結束';
  }

  overlay.classList.add('show');
}

// ---- Rendering ----
function render() {
  renderOpponents();
  renderPlayer();
  renderPlayArea();
  renderControls();
}

function renderOpponents() {
  const container = document.getElementById('opponents');
  container.innerHTML = '';

  for (let i = 1; i <= 3; i++) {
    const p = players[i];
    const div = document.createElement('div');
    div.className = 'opponent';

    let hpHtml = '';
    for (let h = 0; h < MAX_HP; h++) {
      hpHtml += `<span class="hp-heart ${h >= p.hp ? 'lost' : ''}">❤️</span>`;
    }

    let claimText = '';
    if (currentPlay && currentPlay.player === i) {
      claimText = `聲稱 ${currentPlay.claim} ×${currentPlay.cards.length}`;
    }

    div.innerHTML = `
      <div class="opponent-name">${p.name}</div>
      <div class="opponent-hp">${hpHtml}</div>
      <div class="opponent-cards-info">手牌: ${hands[i].length} 張</div>
      <div class="opponent-claim">${claimText}</div>
    `;
    container.appendChild(div);
  }
}

function renderPlayer() {
  const handEl = document.getElementById('hand');
  handEl.innerHTML = '';

  hands[0].forEach((card, idx) => {
    const div = document.createElement('div');
    div.className = 'card';
    if (selectedCards.has(idx)) div.classList.add('selected');
    if (!playerTurn) div.classList.add('disabled');
    if (card.isJoker) div.classList.add('is-joker');
    else if (card.suit === '♥' || card.suit === '♦') div.classList.add('red');
    else div.classList.add('black');

    div.innerHTML = `
      <div class="rank">${card.rank}</div>
      <div class="suit">${card.suit}</div>
    `;
    div.onclick = () => toggleCard(idx);
    handEl.appendChild(div);
  });

  document.getElementById('playerCardCount').textContent = `(${hands[0].length}張)`;

  let hpHtml = '';
  for (let h = 0; h < MAX_HP; h++) {
    hpHtml += `<span class="hp-heart ${h >= players[0].hp ? 'lost' : ''}">❤️</span>`;
  }
  document.getElementById('playerHp').innerHTML = hpHtml;
}

function renderPlayArea() {
  const area = document.getElementById('playArea');
  const existingCards = area.querySelector('.play-cards');
  const existingClaim = area.querySelector('.play-claim');
  const empty = document.getElementById('playEmpty');

  if (existingCards) existingCards.remove();
  if (existingClaim) existingClaim.remove();

  if (!currentPlay) {
    empty.style.display = '';
    return;
  }

  empty.style.display = 'none';

  const cardsDiv = document.createElement('div');
  cardsDiv.className = 'play-cards';

  currentPlay.cards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'play-card';
    div.style.animationDelay = (i * 0.1) + 's';

    if (card.isJoker) {
      div.classList.add('revealed', 'is-joker');
      div.innerHTML = `<div class="rank">🌟Joker</div>`;
    } else {
      div.classList.add('revealed');
      const isRed = card.suit === '♥' || card.suit === '♦';
      div.innerHTML = `
        <div class="rank" style="color:${isRed ? '#c62828' : '#263238'}">${card.rank}</div>
        <div class="suit" style="color:${isRed ? '#c62828' : '#263238'}">${card.suit}</div>
      `;
    }
    cardsDiv.appendChild(div);
  });

  const claimDiv = document.createElement('div');
  claimDiv.className = 'play-claim';
  const playerName = players[currentPlay.player].name;
  claimDiv.textContent = `${playerName} 聲稱：${currentPlay.cards.length} 張 ${currentPlay.claim}`;

  area.appendChild(cardsDiv);
  area.appendChild(claimDiv);
}

function renderControls() {
  const btnPlay = document.getElementById('btnPlay');
  const btnChallenge = document.getElementById('btnChallenge');

  btnPlay.textContent = `出牌 (${selectedCards.size})`;
  btnPlay.disabled = !playerTurn || selectedCards.size === 0 || currentPlay?.player === 0;
}

function addLog(msg, cls) {
  const log = document.getElementById('log');
  const p = document.createElement('p');
  if (cls) p.className = cls;
  p.textContent = msg;
  log.appendChild(p);
  log.scrollTop = log.scrollHeight;
}

// ---- Event Listeners ----
document.getElementById('btnPlay').onclick = playerPlay;
document.getElementById('btnChallenge').onclick = playerChallenge;

// ---- Start ----
startGame();
</script>
</body>
</html>
