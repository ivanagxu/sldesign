<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liar's Deck 吹牛王牌</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Microsoft JhengHei', sans-serif;
  background: linear-gradient(135deg, #1a0a0a, #2d1515, #1a0a0a);
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}
.container {
  max-width: 520px;
  margin: 0 auto;
  padding: 10px 12px 140px;
  min-height: 100vh;
  position: relative;
}

/* --- Title Bar --- */
.title-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
h1 {
  font-size: 22px;
  background: linear-gradient(90deg, #ff4444, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.table-card-display {
  background: rgba(255,68,68,0.2);
  border: 2px solid #ff4444;
  border-radius: 12px;
  padding: 6px 14px;
  text-align: center;
  font-size: 14px;
}
.table-card-display .label { font-size: 10px; color: #aaa; }
.table-card-display .card { font-size: 22px; font-weight: bold; color: #ff4444; }

/* --- Opponents --- */
.opponents {
  display: flex;
  justify-content: space-around;
  margin-bottom: 10px;
  gap: 6px;
}
.opponent {
  background: rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 10px 6px;
  text-align: center;
  flex: 1;
  position: relative;
  transition: all 0.3s;
  border: 2px solid transparent;
}
.opponent.active-turn {
  border-color: #ffd700;
  box-shadow: 0 0 18px rgba(255,215,0,0.35);
}
.opponent.hit {
  animation: hitShake 0.5s ease;
  background: rgba(255,50,50,0.35);
}
.opponent.dead {
  opacity: 0.3;
  filter: grayscale(1);
}
.opponent-name { font-size: 13px; font-weight: bold; margin-bottom: 2px; }

/* Revolver */
.revolver {
  font-size: 12px;
  color: #ff6b6b;
  margin-bottom: 4px;
  font-weight: bold;
}
.revolver-bar {
  display: flex;
  gap: 2px;
  justify-content: center;
  margin-top: 2px;
}
.chamber {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid #555;
  background: #333;
  transition: background 0.3s;
}
.chamber.fired { background: #ff4444; border-color: #ff4444; }
.chamber.live { background: #ffd700; border-color: #ffd700; }

.opponent-cards-info { font-size: 10px; color: #888; }
.opponent-claim { font-size: 10px; color: #ffd700; margin-top: 4px; min-height: 14px; }
.opponent-winner { font-size: 10px; color: #4caf50; margin-top: 2px; }

/* --- Play Area --- */
.play-area {
  background: rgba(0,0,0,0.35);
  border-radius: 16px;
  padding: 16px;
  min-height: 130px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  position: relative;
}
.play-cards {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.play-card {
  width: 50px;
  height: 72px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: dealCard 0.35s ease-out;
}
.play-card.facedown {
  background: linear-gradient(145deg, #8b0000, #5c0000);
  border: 2px solid #a00;
  box-shadow: 2px 3px 10px rgba(0,0,0,0.5);
  font-size: 20px;
  color: #ffd700;
}
.play-card.revealed {
  background: #fff;
  border: 2px solid #ccc;
  flex-direction: column;
  box-shadow: 2px 3px 10px rgba(0,0,0,0.3);
}
.play-card.revealed .rank { font-size: 18px; font-weight: bold; }
.play-card.revealed .suit { font-size: 14px; }
.play-card.revealed.is-joker {
  background: linear-gradient(135deg, #ff6f00, #ff8f00);
  color: #fff;
  border-color: #ff6f00;
}
.play-claim {
  font-size: 13px;
  color: #ffd700;
  margin-top: 10px;
  text-align: center;
}
.play-count {
  font-size: 12px;
  color: #aaa;
  margin-top: 4px;
}
.play-empty { color: #556; font-size: 13px; }

/* --- Player Hand --- */
.player-section {
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 12px;
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 520px;
  z-index: 10;
  border-top: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
}
.player-label {
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.hand {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  min-height: 80px;
  align-items: center;
}
.card {
  width: 58px;
  height: 82px;
  background: linear-gradient(145deg, #f5f5f5, #e0e0e0);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  border: 2px solid #bbb;
  position: relative;
}
.card:hover { transform: translateY(-8px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
.card.selected {
  transform: translateY(-14px);
  border-color: #ffd700;
  box-shadow: 0 0 15px rgba(255,215,0,0.5);
}
.card.disabled { opacity: 0.5; pointer-events: none; }
.card.is-joker {
  background: linear-gradient(135deg, #ff6f00, #e65100);
  color: #fff;
  border-color: #ff8f00;
}
.card.is-joker .rank { font-size: 14px; }
.card.red { color: #c62828; }
.card.black { color: #263238; }
.card .rank { font-size: 22px; font-weight: bold; }
.card .suit { font-size: 16px; }

/* --- Controls --- */
.controls {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  justify-content: center;
}
.btn {
  padding: 10px 22px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.btn:active { transform: scale(0.95); }
.btn-play { background: linear-gradient(135deg, #43a047, #2e7d32); color: #fff; }
.btn-challenge { background: linear-gradient(135deg, #e53935, #b71c1c); color: #fff; }
.btn:disabled { opacity: 0.4; pointer-events: none; }
.btn-start { background: linear-gradient(135deg, #ffd700, #ff8f00); color: #1a1a2e; padding: 14px 36px; font-size: 18px; }
.btn-challenge { animation: pulse 1.2s infinite; }

/* --- Log --- */
.log {
  margin-bottom: 12px;
  max-height: 100px;
  overflow-y: auto;
  font-size: 12px;
  color: #99aabb;
  padding: 6px;
}
.log p { margin-bottom: 3px; line-height: 1.4; }
.log .damage { color: #ff5252; }
.log .info { color: #64b5f6; }
.log .claim { color: #ffd700; }
.log .reveal { color: #ff9800; }

/* --- Game Over --- */
.game-over {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  animation: fadeIn 0.5s ease;
}
.game-over.show { display: flex; }
.game-over h2 { font-size: 36px; margin-bottom: 10px; }
.game-over .winner { color: #ffd700; }
.game-over .loser { color: #ff5252; }

/* --- Shooting Animation --- */
.shoot-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(180,0,0,0.6);
  z-index: 90;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
.shoot-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
.shoot-text {
  font-size: 48px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 30px #ff0000;
  animation: shootFlash 0.5s ease;
}
.shoot-survive { color: #4caf50; }
.shoot-die { color: #ff0000; }

@keyframes dealCard {
  from { transform: scale(0.5) rotate(-10deg); opacity: 0; }
  to { transform: scale(1) rotate(0); opacity: 1; }
}
@keyframes hitShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
@keyframes shootFlash {
  0% { transform: scale(2); opacity: 0; }
  50% { transform: scale(1); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

.log::-webkit-scrollbar { width: 4px; }
.log::-webkit-scrollbar-thumb { background: #445; border-radius: 2px; }
</style>
</head>
<body>
<div class="container">
  <div class="title-bar">
    <h1>🃏 Liar's Deck</h1>
    <div class="table-card-display">
      <div class="label">Table Card</div>
      <div class="card" id="tableCardDisplay">—</div>
    </div>
  </div>
  <div class="subtitle" style="text-align:center;font-size:11px;color:#666;margin-bottom:10px;">左輪手槍 · 1發實彈 · 吹牛求生</div>

  <div class="opponents" id="opponents"></div>

  <div class="play-area" id="playArea">
    <div class="play-empty" id="playEmpty">等待第一手出牌...</div>
  </div>

  <div class="log" id="log"></div>

  <div class="player-section" id="playerSection">
    <div class="player-label">
      <span>👤 你 <span id="playerCardCount"></span></span>
      <div class="revolver" id="playerRevolver"></div>
    </div>
    <div class="hand" id="hand"></div>
    <div class="controls" id="controls">
      <button class="btn btn-play" id="btnPlay" disabled>出牌 (0)</button>
      <button class="btn btn-challenge" id="btnChallenge" style="display:none">🚨 LIAR!</button>
    </div>
  </div>
</div>

<div class="shoot-overlay" id="shootOverlay">
  <div class="shoot-text" id="shootText"></div>
</div>

<div class="game-over" id="gameOver">
  <h2 id="gameOverTitle"></h2>
  <p id="gameOverMsg" style="font-size:16px;margin-bottom:20px;"></p>
  <button class="btn btn-start" onclick="startGame()">🔄 再來一局</button>
</div>

<script>
const RANKS = ['Q', 'K', 'A'];
const WILDCARD = 'J';
const MAX_CHAMBERS = 6;
const HAND_SIZE = 5;
const MAX_PLAY = 3;

let deck = [], players = [], hands = [];
let tableCard = '';
let currentPlay = null;
let selectedCards = new Set();
let roundNumber = 0;
let gameActive = false;
let playerTurn = false;
let processingAI = false;
let currentTurn = 0; // which player index is currently taking their turn

// ---- Deck Creation ----
function createDeck() {
  let d = [];
  // Q×6, K×6, A×6 (with suits)
  const suits = ['♠', '♥', '♣', '♦'];
  let suitIdx = 0;
  for (const r of RANKS) {
    for (let i = 0; i < 6; i++) {
      d.push({ rank: r, suit: suits[suitIdx % 4], isJoker: false, id: `${r}_${i}` });
      suitIdx++;
    }
  }
  // J×2 (wildcards)
  for (let i = 0; i < 2; i++) {
    d.push({ rank: WILDCARD, suit: '★', isJoker: true, id: `J_${i}` });
  }
  return d; // 20 cards total
}

function shuffle(d) {
  for (let i = d.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [d[i], d[j]] = [d[j], d[i]];
  }
  return d;
}

// ---- Game Init ----
function startGame() {
  document.getElementById('gameOver').classList.remove('show');
  deck = shuffle(createDeck());
  players = [
    { name: '你', hp: 0, isHuman: true, alive: true, bulletPos: 0 },
    { name: 'Alice', hp: 0, isHuman: false, alive: true, bulletPos: 0 },
    { name: 'Bob', hp: 0, isHuman: false, alive: true, bulletPos: 0 },
    { name: 'Charlie', hp: 0, isHuman: false, alive: true, bulletPos: 0 }
  ];
  hands = [[], [], [], []];
  selectedCards.clear();
  roundNumber = 0;
  currentPlay = null;
  gameActive = true;
  playerTurn = false;
  processingAI = false;

  // Assign random bullet positions
  for (let p = 0; p < 4; p++) {
    players[p].bulletPos = Math.floor(Math.random() * MAX_CHAMBERS) + 1; // 1-6
    players[p].hp = 0;
    players[p].alive = true;
  }

  // Deal 5 cards each (20 total)
  for (let i = 0; i < HAND_SIZE; i++)
    for (let p = 0; p < 4; p++)
      if (deck.length > 0) hands[p].push(deck.pop());

  addLog('🎮 遊戲開始！每人發 5 張牌，左輪已裝彈（1發實彈，位置隨機）', 'info');
  startNewRound();
}

function startNewRound() {
  if (!gameActive) return;
  roundNumber++;
  currentPlay = null;
  selectedCards.clear();
  tableCard = RANKS[Math.floor(Math.random() * RANKS.length)];

  document.getElementById('tableCardDisplay').textContent = tableCard;

  addLog(`━━━ 第${roundNumber}輪：Table 牌是 ${tableCard} ━━━`, 'info');
  document.getElementById('playEmpty').style.display = '';
  document.getElementById('playArea').querySelector('.play-cards')?.remove();
  document.getElementById('playArea').querySelector('.play-claim')?.remove();
  document.getElementById('playArea').querySelector('.play-count')?.remove();

  // Find first alive player to start the round
  currentTurn = 0;
  while (!players[currentTurn].alive) {
    currentTurn = (currentTurn + 1) % 4;
  }

  render();
  giveTurnTo(currentTurn);
}

// Give turn to a specific player
function giveTurnTo(pIdx) {
  currentTurn = pIdx;
  processingAI = false;

  if (pIdx === 0) {
    // Human's turn
    playerTurn = true;
    document.getElementById('btnChallenge').style.display = currentPlay ? '' : 'none';
    if (currentPlay) {
      addLog(`🚨 輪到你了！可以質疑 ${players[currentPlay.player].name} 或出牌`, 'info');
    } else {
      addLog('輪到你了！出 1-3 張牌（聲稱為 ' + tableCard + '）', 'info');
    }
    render();
  } else {
    // AI's turn
    playerTurn = false;
    document.getElementById('btnChallenge').style.display = 'none';
    render();
    setTimeout(() => aiTakeTurn(pIdx), 1500);
  }
}

// ---- Helpers ----
function cardName(c) {
  return c.isJoker ? '🃏Joker' : c.rank;
}
function cardDisplay(c) {
  return c.isJoker ? 'J★' : c.rank;
}
function nextAlivePlayer(from) {
  for (let i = 1; i <= 4; i++) {
    const p = (from + i) % 4;
    if (players[p].alive) return p;
  }
  return -1;
}
function isTableCard(c) {
  return c.isJoker || c.rank === tableCard;
}

function countTableInHand(p) {
  return hands[p].filter(c => isTableCard(c)).length;
}

// ---- Shooting ----
async function triggerShot(playerIdx) {
  const p = players[playerIdx];
  p.hp++;

  const overlay = document.getElementById('shootOverlay');
  const text = document.getElementById('shootText');

  overlay.classList.add('show');

  if (p.hp >= p.bulletPos) {
    // LETHAL
    text.className = 'shoot-text shoot-die';
    text.innerHTML = `💀 ${p.name}<br>中彈！`;
    p.alive = false;
    addLog(`💀 ${p.name} 第 ${p.hp} 槍 — 實彈！中彈陣亡！`, 'damage');
    showHitEffect(playerIdx);
  } else {
    // SURVIVE
    text.className = 'shoot-text shoot-survive';
    text.innerHTML = `🔫 ${p.name}<br>空槍... (${p.hp}/${MAX_CHAMBERS})`;
    addLog(`🔫 ${p.name} 第 ${p.hp} 槍 — 空槍！(${p.hp}/${MAX_CHAMBERS})`, 'damage');
  }

  await new Promise(r => setTimeout(r, 1200));
  overlay.classList.remove('show');
  render();
}

// ---- Player Actions ----
function toggleCard(idx) {
  if (!playerTurn || !gameActive || processingAI) return;
  if (selectedCards.has(idx)) {
    selectedCards.delete(idx);
  } else if (selectedCards.size < MAX_PLAY) {
    selectedCards.add(idx);
  }
  render();
}

async function playerPlay() {
  if (!playerTurn || selectedCards.size === 0 || processingAI) return;
  const cards = [...selectedCards].map(i => hands[0][i]);
  currentPlay = { player: 0, cards, claim: tableCard };

  // Remove from hand
  [...selectedCards].sort((a,b) => b-a).forEach(i => hands[0].splice(i, 1));
  selectedCards.clear();

  addLog(`👤 你出了 ${cards.length} 張牌`, 'claim');

  if (hands[0].length === 0) {
    addLog('👤 你出完了所有牌！', 'info');
  }

  render();

  // Pass to next alive player
  const next = nextAlivePlayer(0);
  if (next === -1 || checkGameOver()) return;
  setTimeout(() => giveTurnTo(next), 1200);
}

async function playerChallenge() {
  if (!playerTurn || !currentPlay || processingAI) return;
  playerTurn = false;
  processingAI = true;
  document.getElementById('btnChallenge').style.display = 'none';
  await resolveChallenge(0, currentPlay.player);
}

// ---- AI Logic ----
async function aiTakeTurn(p) {
  if (!gameActive || !players[p].alive) {
    // Skip dead AI, go to next
    const next = nextAlivePlayer(p);
    if (next === -1 || checkGameOver()) return;
    giveTurnTo(next);
    return;
  }

  processingAI = true;
  render();

  // If there's a current play, AI decides whether to challenge or play
  if (currentPlay) {
    const decision = aiDecide(p);
    if (decision === 'challenge') {
      addLog(`🚨 ${players[p].name} 質疑 ${players[currentPlay.player].name}！`, 'reveal');
      await resolveChallenge(p, currentPlay.player);
      return;
    }
  }

  // AI plays cards
  if (hands[p].length === 0) {
    addLog(`🏅 ${players[p].name} 已出完牌，跳過！`, 'info');
    const next = nextAlivePlayer(p);
    if (next === -1 || checkGameOver()) return;
    processingAI = false;
    giveTurnTo(next);
    return;
  }

  const cards = aiChooseCards(p);
  if (!cards || cards.length === 0) {
    const next = nextAlivePlayer(p);
    if (next === -1 || checkGameOver()) return;
    processingAI = false;
    giveTurnTo(next);
    return;
  }

  currentPlay = { player: p, cards, claim: tableCard };

  // Remove from hand
  for (const c of cards) {
    const idx = hands[p].findIndex(h => h === c);
    if (idx >= 0) hands[p].splice(idx, 1);
  }

  addLog(`🤖 ${players[p].name} 出了 ${cards.length} 張牌`, 'claim');

  if (hands[p].length === 0) {
    addLog(`🏅 ${players[p].name} 出完了所有牌！`, 'info');
  }

  render();

  // Pass to next alive player
  const next = nextAlivePlayer(p);
  if (next === -1 || checkGameOver()) return;

  processingAI = false;
  setTimeout(() => giveTurnTo(next), 1200);
}

function aiDecide(p) {
  if (!currentPlay) return 'play';

  const numPlayed = currentPlay.cards.length;
  const held = countTableInHand(p);

  // Base lie probability
  let lieProb = numPlayed >= 3 ? 0.65 : (numPlayed === 2 ? 0.40 : 0.25);
  lieProb += held * 0.08;
  lieProb = Math.min(0.85, lieProb);

  if (Math.random() < lieProb) {
    return 'challenge';
  }
  return 'play';
}

function aiChooseCards(p) {
  const hand = hands[p];
  if (hand.length === 0) return [];

  const matching = hand.filter(c => isTableCard(c));
  const nonMatching = hand.filter(c => !isTableCard(c));

  const bluff = Math.random() < 0.25;

  if (matching.length > 0 && !bluff) {
    const count = Math.min(MAX_PLAY, matching.length, 1 + Math.floor(Math.random() * 2));
    return matching.slice(0, count);
  }

  if (nonMatching.length > 0) {
    const count = Math.min(MAX_PLAY, nonMatching.length);
    return nonMatching.slice(0, count);
  }

  if (matching.length > 0) return [matching[0]];
  return [hand[0]];
}

// ---- Challenge Resolution ----
async function resolveChallenge(challengerIdx, liarIdx) {
  const play = currentPlay;
  if (!play) { processingAI = false; return; }

  const allTruth = play.cards.every(c => isTableCard(c));

  // Reveal cards
  addLog(`🚨 ${players[challengerIdx].name} 質疑！開牌：${play.cards.map(c => c.isJoker ? 'Joker★' : c.rank + c.suit).join(', ')}`, 'reveal');

  // Show revealed cards in play area
  renderRevealed(play);

  await new Promise(r => setTimeout(r, 800));

  if (allTruth) {
    // Challenge failed -> challenger takes shot
    addLog(`✅ 全是 ${tableCard}！質疑失敗！${players[challengerIdx].name} 吃槍！`, 'damage');
    await triggerShot(challengerIdx);
  } else {
    // Challenge success -> liar takes shot
    addLog(`❌ 不是 ${tableCard}！質疑成功！${players[liarIdx].name} 吃槍！`, 'damage');
    await triggerShot(liarIdx);
  }

  currentPlay = null;
  render();

  // Check game over
  if (checkGameOver()) { processingAI = false; return; }

  // After challenge, turn passes to the NEXT player after the challenger
  // (the one who would have been next after the challenged player's play)
  const nextAfterChallenger = nextAlivePlayer(challengerIdx);
  if (nextAfterChallenger === -1 || checkGameOver()) { processingAI = false; return; }

  await new Promise(r => setTimeout(r, 1500));
  processingAI = false;
  giveTurnTo(nextAfterChallenger);
}

function renderRevealed(play) {
  const area = document.getElementById('playArea');
  const existingCards = area.querySelector('.play-cards');
  if (existingCards) existingCards.remove();

  const cardsDiv = document.createElement('div');
  cardsDiv.className = 'play-cards';

  play.cards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'play-card revealed';
    div.style.animationDelay = (i * 0.15) + 's';

    if (card.isJoker) {
      div.classList.add('is-joker');
      div.innerHTML = `<div class="rank">🌟</div><div class="suit">Joker</div>`;
    } else {
      const isRed = card.suit === '♥' || card.suit === '♦';
      div.innerHTML = `<div class="rank" style="color:${isRed ? '#c62828' : '#263238'}">${card.rank}</div><div class="suit" style="color:${isRed ? '#c62828' : '#263238'}">${card.suit}</div>`;
    }
    cardsDiv.appendChild(div);
  });

  area.appendChild(cardsDiv);
}

// ---- Game Over ----
function checkGameOver() {
  const alive = players.filter(p => p.alive);

  if (alive.length === 1) {
    gameActive = false;
    showGameOver(alive[0] === players[0]);
    return true;
  }

  if (alive.length === 0) {
    gameActive = false;
    showGameOver(false);
    return true;
  }

  return false;
}

function showGameOver(playerWon) {
  const overlay = document.getElementById('gameOver');
  const title = document.getElementById('gameOverTitle');
  const msg = document.getElementById('gameOverMsg');

  if (playerWon) {
    title.innerHTML = '<span class="winner">🏆 你贏了！</span>';
    msg.textContent = '恭喜！你是最後存活的贏家！';
  } else {
    const winner = players.find(p => p.alive);
    title.innerHTML = '<span class="loser">💀 你陣亡了！</span>';
    msg.textContent = winner ? `${winner.name} 最後存活！` : '全員陣亡';
  }

  overlay.classList.add('show');
}

// ---- Rendering ----
function render() {
  renderOpponents();
  renderPlayer();
  renderPlayArea();
  renderControls();
}

function renderOpponents() {
  const container = document.getElementById('opponents');
  container.innerHTML = '';

  for (let i = 1; i <= 3; i++) {
    const p = players[i];
    const div = document.createElement('div');
    div.className = 'opponent';
    if (!p.alive) div.classList.add('dead');
    if (currentTurn === i) div.classList.add('active-turn');

    // Revolver display
    let chamberHtml = '';
    for (let c = 1; c <= MAX_CHAMBERS; c++) {
      let cls = 'chamber';
      if (c <= p.hp) cls += ' fired';
      if (c === p.bulletPos && p.hp >= p.bulletPos) cls += ' live';
      chamberHtml += `<div class="${cls}"></div>`;
    }

    let claimText = '';
    if (currentPlay && currentPlay.player === i) {
      claimText = `出了 ${currentPlay.cards.length} 張`;
    } else if (currentTurn === i) {
      claimText = '🎯 思考中...';
    }
    let winnerText = '';
    if (hands[i].length === 0 && p.alive) {
      winnerText = '🏅 已出完';
    }

    div.innerHTML = `
      <div class="opponent-name">${p.name} ${!p.alive ? '💀' : ''}</div>
      <div class="revolver">${p.hp}/${MAX_CHAMBERS}</div>
      <div class="revolver-bar">${chamberHtml}</div>
      <div class="opponent-cards-info">手牌: ${hands[i].length} 張</div>
      <div class="opponent-claim">${claimText}</div>
      <div class="opponent-winner">${winnerText}</div>
    `;
    container.appendChild(div);
  }
}

function renderPlayer() {
  const p = players[0];
  const handEl = document.getElementById('hand');
  handEl.innerHTML = '';

  hands[0].forEach((card, idx) => {
    const div = document.createElement('div');
    div.className = 'card';
    if (selectedCards.has(idx)) div.classList.add('selected');
    if (!playerTurn || processingAI) div.classList.add('disabled');
    if (card.isJoker) div.classList.add('is-joker');

    if (card.isJoker) {
      div.innerHTML = `<div class="rank">J</div><div class="suit">★</div>`;
    } else {
      const isRed = card.suit === '♥' || card.suit === '♦';
      if (isRed) div.classList.add('red');
      else div.classList.add('black');
      div.innerHTML = `<div class="rank">${card.rank}</div><div class="suit">${card.suit}</div>`;
    }
    div.onclick = () => toggleCard(idx);
    handEl.appendChild(div);
  });

  document.getElementById('playerCardCount').textContent = `(${hands[0].length}張)`;

  // Player revolver
  let chamberHtml = '';
  for (let c = 1; c <= MAX_CHAMBERS; c++) {
    let cls = 'chamber';
    if (c <= p.hp) cls += ' fired';
    if (c === p.bulletPos && p.hp >= p.bulletPos) cls += ' live';
    chamberHtml += `<div class="${cls}"></div>`;
  }
  document.getElementById('playerRevolver').innerHTML = `
    <div>${p.hp}/${MAX_CHAMBERS}</div>
    <div class="revolver-bar">${chamberHtml}</div>
  `;
}

function renderPlayArea() {
  const area = document.getElementById('playArea');
  const existingCards = area.querySelector('.play-cards');
  const existingClaim = area.querySelector('.play-claim');
  const existingCount = area.querySelector('.play-count');
  const empty = document.getElementById('playEmpty');

  if (existingCards) existingCards.remove();
  if (existingClaim) existingClaim.remove();
  if (existingCount) existingCount.remove();

  if (!currentPlay) {
    empty.style.display = '';
    return;
  }

  empty.style.display = 'none';

  // Face-down cards
  const cardsDiv = document.createElement('div');
  cardsDiv.className = 'play-cards';
  currentPlay.cards.forEach((_, i) => {
    const div = document.createElement('div');
    div.className = 'play-card facedown';
    div.style.animationDelay = (i * 0.1) + 's';
    div.textContent = '?';
    cardsDiv.appendChild(div);
  });
  area.appendChild(cardsDiv);

  // Claim
  const claimDiv = document.createElement('div');
  claimDiv.className = 'play-claim';
  const playerName = players[currentPlay.player].name;
  claimDiv.textContent = `${playerName} 聲稱：${currentPlay.cards.length} 張 ${tableCard}`;
  area.appendChild(claimDiv);

  // Count hint
  const countDiv = document.createElement('div');
  countDiv.className = 'play-count';
  countDiv.textContent = `（${currentPlay.cards.length} 張牌面朝下）`;
  area.appendChild(countDiv);
}

function renderControls() {
  const btnPlay = document.getElementById('btnPlay');
  const btnChallenge = document.getElementById('btnChallenge');

  btnPlay.textContent = `出牌 (${selectedCards.size})`;
  btnPlay.disabled = !playerTurn || selectedCards.size === 0 || processingAI;

  // Challenge button visible when it's player's turn AND there's a current play from someone else
  const canChallenge = playerTurn && currentPlay && currentPlay.player !== 0;
  btnChallenge.style.display = canChallenge ? '' : 'none';
}

function addLog(msg, cls) {
  const log = document.getElementById('log');
  const p = document.createElement('p');
  if (cls) p.className = cls;
  p.textContent = msg;
  log.appendChild(p);
  log.scrollTop = log.scrollHeight;
}

function showHitEffect(pIdx) {
  setTimeout(() => {
    const el = pIdx === 0
      ? document.querySelector('.player-section')
      : document.querySelectorAll('.opponent')[pIdx - 1];
    if (el) {
      el.classList.add('hit');
      setTimeout(() => el.classList.remove('hit'), 600);
    }
  }, 100);
}

// ---- Event Listeners ----
document.getElementById('btnPlay').onclick = playerPlay;
document.getElementById('btnChallenge').onclick = playerChallenge;

// ---- Start ----
startGame();
</script>
</body>
</html>
