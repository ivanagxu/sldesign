<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SL Design - 射击训练</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SPNTNEW4GH"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-SPNTNEW4GH');
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        body { line-height: 1.6; color: #333; background-color: #0a0e17; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* HUD */
        .hud { position: fixed; top: 0; left: 0; right: 0; padding: 1rem; display: flex; justify-content: space-between; align-items: center; z-index: 10; pointer-events: none; }
        .hud-box { background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 8px; padding: 0.4rem 0.8rem; color: #e2e8f0; font-size: 0.85rem; backdrop-filter: blur(4px); }
        .hud-box .label { color: #94a3b8; font-size: 0.7rem; }
        .hud-box .value { color: #60a5fa; font-weight: 700; font-size: 1rem; }

        .back-link { position: fixed; top: 1rem; left: 50%; transform: translateX(-50%); z-index: 10; }
        .back-link a { display: inline-flex; align-items: center; gap: 0.4rem; color: #94a3b8; text-decoration: none; background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 8px; padding: 0.4rem 1rem; font-size: 0.8rem; transition: all 0.3s; pointer-events: auto; }
        .back-link a:hover { color: #60a5fa; border-color: #3b82f6; }

        /* 准星 */
        .crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; width: 40px; height: 40px; }
        .crosshair .ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border: 2px solid rgba(239, 68, 68, 0.7); border-radius: 50%; }
        .crosshair .dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 3px; height: 3px; background: #ef4444; border-radius: 50%; }
        .crosshair .bar { position: absolute; background: rgba(239, 68, 68, 0.6); }
        .crosshair .bar.top { top: 2px; left: 50%; transform: translateX(-50%); width: 2px; height: 10px; }
        .crosshair .bar.bottom { bottom: 2px; left: 50%; transform: translateX(-50%); width: 2px; height: 10px; }
        .crosshair .bar.left { left: 2px; top: 50%; transform: translateY(-50%); height: 2px; width: 10px; }
        .crosshair .bar.right { right: 2px; top: 50%; transform: translateY(-50%); height: 2px; width: 10px; }

        /* 开火闪光 */
        .muzzle-flash { position: fixed; bottom: 20%; right: 30%; width: 80px; height: 80px; background: radial-gradient(circle, rgba(255, 200, 50, 0.9) 0%, rgba(255, 100, 0, 0.3) 40%, transparent 70%); border-radius: 50%; pointer-events: none; opacity: 0; transition: opacity 0.05s; z-index: 15; transform: translate(-50%, -50%); }
        .muzzle-flash.active { opacity: 1; }

        /* 得分提示 */
        .score-popup { position: fixed; pointer-events: none; z-index: 25; color: #fbbf24; font-weight: 700; font-size: 1.2rem; opacity: 0; transition: all 0.5s ease-out; }
        .score-popup.active { opacity: 1; transform: translateY(-30px); }

        /* 命中特效 */
        .hit-marker { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 25; opacity: 0; transition: opacity 0.05s; }
        .hit-marker.active { opacity: 1; }
        .hit-marker .x-line { position: absolute; width: 20px; height: 3px; background: #ef4444; top: 50%; left: 50%; }
        .hit-marker .x-line:first-child { transform: translate(-50%, -50%) rotate(45deg); }
        .hit-marker .x-line:last-child { transform: translate(-50%, -50%) rotate(-45deg); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="hud">
        <div class="hud-box">
            <div class="label">得分</div>
            <div class="value" id="scoreDisplay">0</div>
        </div>
        <div class="hud-box">
            <div class="label">命中率</div>
            <div class="value" id="accuracyDisplay">--%</div>
        </div>
        <div class="hud-box">
            <div class="label">弹药</div>
            <div class="value" id="ammoDisplay">30 / 30</div>
        </div>
    </div>

    <div class="back-link">
        <a href="../games.html"><i class="fas fa-arrow-left"></i> 返回游戏</a>
    </div>

    <div class="crosshair" id="crosshair">
        <div class="ring"></div>
        <div class="dot"></div>
        <div class="bar top"></div>
        <div class="bar bottom"></div>
        <div class="bar left"></div>
        <div class="bar right"></div>
    </div>
    <div class="muzzle-flash" id="muzzleFlash"></div>
    <div class="hit-marker" id="hitMarker">
        <div class="x-line"></div>
        <div class="x-line"></div>
    </div>

    <script>
        // ========== 游戏配置 ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 鼠标/触摸位置
        let mouseX = W / 2, mouseY = H / 2;

        canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }, { passive: false });

        // 游戏状态
        let score = 0, totalShots = 0, hits = 0;
        let ammo = 30, maxAmmo = 30, reloading = false;
        let targets = [];
        let particles = [];
        let lastSpawn = 0;

        // 枪械状态
        let gunRecoil = 0;
        let gunAngle = 0;

        // ========== 目标管理 ==========
        function spawnTarget() {
            const margin = 60;
            const radius = 15 + Math.random() * 25;
            const color = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6'][Math.floor(Math.random() * 5)];
            const points = Math.round(100 * (40 / radius));

            targets.push({
                x: margin + Math.random() * (W - margin * 2),
                y: margin + 40 + Math.random() * (H * 0.55),
                radius, color, points,
                vx: (Math.random() - 0.5) * 3,
                vy: (Math.random() - 0.5) * 2,
                born: performance.now(),
                lifetime: 2500 + Math.random() * 2000,
                pulse: 0
            });
        }

        function updateTargets(now) {
            // 生成目标
            if (now - lastSpawn > 1200) {
                spawnTarget();
                lastSpawn = now;
            }

            for (let i = targets.length - 1; i >= 0; i--) {
                const t = targets[i];
                t.x += t.vx;
                t.y += t.vy;

                // 边界反弹
                if (t.x < t.radius || t.x > W - t.radius) t.vx *= -1;
                if (t.y < 40 + t.radius || t.y > H * 0.65 + t.radius) t.vy *= -1;
                t.x = Math.max(t.radius, Math.min(W - t.radius, t.x));
                t.y = Math.max(40 + t.radius, Math.min(H * 0.65 + t.radius, t.y));

                t.pulse = Math.sin(now * 0.005) * 3;

                if (now - t.born > t.lifetime) targets.splice(i, 1);
            }
        }

        function drawTargets(now) {
            targets.forEach(t => {
                ctx.save();

                // 外圈发光
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.radius + 8, 0, Math.PI * 2);
                ctx.fillStyle = t.color + '15';
                ctx.fill();

                // 主圆环
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.radius + t.pulse, 0, Math.PI * 2);
                ctx.fillStyle = t.color + '30';
                ctx.fill();
                ctx.strokeStyle = t.color;
                ctx.lineWidth = 2;
                ctx.stroke();

                // 内圈
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.radius * 0.55, 0, Math.PI * 2);
                ctx.fillStyle = t.color + '60';
                ctx.fill();

                // 中心点
                ctx.beginPath();
                ctx.arc(t.x, t.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = t.color;
                ctx.fill();

                // 分数
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(t.points, t.x, t.y - t.radius - 10);

                // 倒计时环
                const lifeRatio = 1 - (now - t.born) / t.lifetime;
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.radius + 4, -Math.PI / 2, -Math.PI / 2 + lifeRatio * Math.PI * 2);
                ctx.strokeStyle = t.color + '80';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            });
        }

        // ========== 射击 ==========
        function shoot(pos) {
            if (reloading || ammo <= 0) {
                if (ammo <= 0) reload();
                return;
            }

            totalShots++;
            ammo--;
            updateHUD();

            // 枪口闪光
            const flash = document.getElementById('muzzleFlash');
            flash.classList.add('active');
            setTimeout(() => flash.classList.remove('active'), 80);

            // 后坐力
            gunRecoil = 15;

            // 命中检测
            let hit = false;
            for (let i = targets.length - 1; i >= 0; i--) {
                const t = targets[i];
                const dx = pos.x - t.x;
                const dy = pos.y - t.y;
                if (dx * dx + dy * dy <= t.radius * t.radius) {
                    hits++;
                    score += t.points;
                    hit = true;
                    createParticles(t.x, t.y, t.color, 12);
                    targets.splice(i, 1);
                    showScorePopup(pos.x, pos.y, '+' + t.points);
                    break;
                }
            }

            // 命中标记
            if (hit) {
                document.getElementById('hitMarker').classList.add('active');
                setTimeout(() => document.getElementById('hitMarker').classList.remove('active'), 150);
            }

            updateHUD();
        }

        canvas.addEventListener('mousedown', (e) => shoot({ x: e.clientX, y: e.clientY }));
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            shoot({ x: e.touches[0].clientX, y: e.touches[0].clientY });
        }, { passive: false });

        function reload() {
            if (reloading || ammo === maxAmmo) return;
            reloading = true;
            setTimeout(() => {
                ammo = maxAmmo;
                reloading = false;
                updateHUD();
            }, 1500);
        }

        window.addEventListener('keydown', (e) => { if (e.key === 'r' || e.key === 'R') reload(); });

        // ========== 粒子系统 ==========
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 4;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: 0.02 + Math.random() * 0.02,
                    color,
                    size: 2 + Math.random() * 3
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.05; // gravity
                p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        // ========== 得分提示 ==========
        function showScorePopup(x, y, text) {
            const el = document.createElement('div');
            el.className = 'score-popup';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            requestAnimationFrame(() => el.classList.add('active'));
            setTimeout(() => el.remove(), 600);
        }

        // ========== HUD ==========
        function updateHUD() {
            document.getElementById('scoreDisplay').textContent = score;
            const acc = totalShots > 0 ? Math.round((hits / totalShots) * 100) : '--';
            document.getElementById('accuracyDisplay').textContent = acc + '%';
            document.getElementById('ammoDisplay').textContent = reloading ? '装弹中...' : `${ammo} / ${maxAmmo}`;
        }

        // ========== 绘制持枪的手 ==========
        function drawGun() {
            ctx.save();

            // 枪口位置（靠近屏幕右下）
            const gripX = W * 0.78;
            const gripY = H * 0.88;

            // 计算指向鼠标的角度
            const aimAngle = Math.atan2(mouseY - gripY, mouseX - gripX);
            const recoilAngle = gunRecoil * 0.01;

            ctx.translate(gripX, gripY);
            ctx.rotate(aimAngle - recoilAngle);

            // === 手臂（从屏幕底部延伸）===
            ctx.save();
            ctx.fillStyle = '#c89b7b';
            ctx.strokeStyle = '#a87d5e';
            ctx.lineWidth = 1.5;

            // 前臂
            ctx.beginPath();
            ctx.moveTo(-180, 10);
            ctx.lineTo(-20, 10);
            ctx.quadraticCurveTo(-10, 10, -10, -10);
            ctx.lineTo(-180, -10);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();

            // === 枪身 ===
            // 套筒（上部）
            ctx.fillStyle = '#2d3748';
            ctx.strokeStyle = '#1a202c';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.roundRect(0, -14, 180, 12, [3, 3, 0, 0]);
            ctx.fill();
            ctx.stroke();

            // 套筒防滑纹
            ctx.strokeStyle = '#4a5568';
            ctx.lineWidth = 1;
            for (let i = 10; i < 30; i += 5) {
                ctx.beginPath();
                ctx.moveTo(i, -14);
                ctx.lineTo(i, -2);
                ctx.stroke();
            }
            for (let i = 150; i < 175; i += 5) {
                ctx.beginPath();
                ctx.moveTo(i, -14);
                ctx.lineTo(i, -2);
                ctx.stroke();
            }

            // 枪管
            ctx.fillStyle = '#374151';
            ctx.strokeStyle = '#1f2937';
            ctx.beginPath();
            ctx.roundRect(0, 2, 200, 12, [0, 0, 3, 3]);
            ctx.fill();
            ctx.stroke();

            // 准星（枪口前端）
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(200, -2, 3, 0, Math.PI * 2);
            ctx.fill();

            // 照门
            ctx.fillStyle = '#6b7280';
            ctx.fillRect(5, -16, 3, 3);
            ctx.fillRect(12, -16, 3, 3);

            // 抛壳窗
            ctx.fillStyle = '#9ca3af';
            ctx.beginPath();
            ctx.roundRect(60, -10, 30, 6, 2);
            ctx.fill();

            // === 握把 ===
            ctx.save();
            ctx.translate(20, 0);
            ctx.rotate(0.15);

            ctx.fillStyle = '#1f2937';
            ctx.strokeStyle = '#111827';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, 14);
            ctx.lineTo(-5, 65);
            ctx.quadraticCurveTo(-5, 72, 5, 72);
            ctx.lineTo(35, 72);
            ctx.quadraticCurveTo(45, 72, 42, 65);
            ctx.lineTo(38, 14);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 握把防滑纹
            ctx.strokeStyle = '#374151';
            ctx.lineWidth = 0.8;
            for (let i = 5; i < 33; i += 5) {
                ctx.beginPath();
                ctx.moveTo(i, 20);
                ctx.lineTo(i, 62);
                ctx.stroke();
            }

            // 扳机护圈
            ctx.strokeStyle = '#4b5563';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(18, 14, 14, 0, Math.PI);
            ctx.stroke();

            // 扳机
            ctx.strokeStyle = '#9ca3af';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(18, 4);
            ctx.quadraticCurveTo(14, 14, 18, 22);
            ctx.stroke();

            // 弹匣底部
            ctx.fillStyle = '#374151';
            ctx.fillRect(2, 68, 34, 6);

            ctx.restore();

            // === 握枪的手 ===
            ctx.save();
            ctx.translate(20, 0);
            ctx.rotate(0.15);

            // 主握持手（右手）
            ctx.fillStyle = '#c89b7b';
            ctx.strokeStyle = '#a87d5e';
            ctx.lineWidth = 1;

            // 手掌覆盖握把
            ctx.beginPath();
            ctx.ellipse(18, 40, 22, 30, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // 手指（握住握把前方）
            for (let i = 0; i < 4; i++) {
                ctx.fillStyle = '#c89b7b';
                ctx.strokeStyle = '#a87d5e';
                ctx.beginPath();
                ctx.ellipse(25 + i * 6, 25 + i * 3, 5, 6, 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }

            // 拇指（搭在套筒座上）
            ctx.fillStyle = '#c89b7b';
            ctx.beginPath();
            ctx.ellipse(5, 5, 14, 5, -0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.restore();

            // 前手（左手支撑枪管）
            ctx.save();
            ctx.fillStyle = '#c89b7b';
            ctx.strokeStyle = '#a87d5e';
            ctx.lineWidth = 1;

            ctx.beginPath();
            ctx.ellipse(100, 8, 18, 14, 0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // 左手手指
            for (let i = 0; i < 3; i++) {
                ctx.fillStyle = '#c89b7b';
                ctx.beginPath();
                ctx.ellipse(105 + i * 6, 20, 5, 5, 0.2, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();

            ctx.restore();

            // 后坐力恢复
            if (gunRecoil > 0) gunRecoil *= 0.85;
        }

        // ========== 主循环 ==========
        function render(now = 0) {
            // 清屏
            ctx.fillStyle = '#0a0e17';
            ctx.fillRect(0, 0, W, H);

            // 网格背景
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.04)';
            ctx.lineWidth = 1;
            for (let x = 0; x < W; x += 40) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
            }
            for (let y = 0; y < H; y += 40) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
            }

            updateTargets(now);
            drawTargets(now);
            drawGun();
            updateParticles();
            drawParticles();

            requestAnimationFrame(render);
        }

        // 启动
        render();
    </script>
</body>
</html>
