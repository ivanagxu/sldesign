<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SL Design - F1 Monaco</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SPNTNEW4GH"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-SPNTNEW4GH');
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e17; color: #e2e8f0; min-height: 100vh; overflow: hidden; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        header { background: #1e293b; padding: 0.5rem 0.8rem; display: flex; align-items: center; gap: 0.8rem; z-index: 10; position: relative; }
        .back-btn { color: #60a5fa; text-decoration: none; font-size: 1.1rem; }
        .game-title { font-size: 1rem; font-weight: 800; color: #ef4444; flex: 1; text-transform: uppercase; letter-spacing: 3px; }
        .game-title span { color: #60a5fa; }
        canvas { display: block; }

        .hud { position: fixed; top: 48px; left: 8px; z-index: 5; display: flex; flex-direction: column; gap: 4px; pointer-events: none; }
        .hud-item { background: rgba(15,23,42,0.92); border: 1px solid #334155; border-radius: 5px; padding: 4px 8px; font-size: 0.75rem; color: #94a3b8; white-space: nowrap; }
        .hud-item b { color: #60a5fa; }
        .hud-right { position: fixed; top: 48px; right: 8px; z-index: 5; text-align: right; pointer-events: none; }
        .speed-gauge { position: fixed; bottom: 8px; right: 8px; z-index: 5; text-align: center; pointer-events: none; }
        .speed-gauge .speed-val { font-size: 1.8rem; font-weight: 800; color: #60a5fa; }
        .speed-gauge .speed-unit { font-size: 0.7rem; color: #64748b; }

        .on-screen-controls { position: fixed; bottom: 10px; left: 8px; right: 8px; display: none; justify-content: space-between; align-items: flex-end; z-index: 10; pointer-events: none; }
        .ctrl-group { display: flex; gap: 6px; pointer-events: auto; }
        .ctrl-group.vert { flex-direction: column; }
        .ctrl-btn { width: 60px; height: 60px; border: 2px solid #475569; border-radius: 14px; background: rgba(30,41,59,0.85); color: #cbd5e1; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; }
        .ctrl-btn:active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .ctrl-btn.accel { border-color: #10b981; color: #10b981; }
        .ctrl-btn.accel:active { background: #10b981; color: white; }
        .ctrl-btn.brake { border-color: #ef4444; color: #ef4444; }
        .ctrl-btn.brake:active { background: #ef4444; color: white; }

        .overlay-screen { position: fixed; inset: 0; background: rgba(10,14,23,0.96); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; gap: 1rem; padding: 1rem; }
        .overlay-screen h1 { font-size: 2rem; color: #ef4444; text-transform: uppercase; letter-spacing: 4px; text-align: center; }
        .overlay-screen h1 span { color: #60a5fa; }
        .overlay-screen p { color: #94a3b8; font-size: 0.9rem; text-align: center; }
        .tire-select { display: flex; gap: 0.8rem; margin: 0.5rem 0; flex-wrap: wrap; justify-content: center; }
        .tire-btn { padding: 0.7rem 1.2rem; border: 2px solid #334155; border-radius: 8px; background: #1e293b; color: #e2e8f0; cursor: pointer; text-align: center; min-width: 90px; }
        .tire-btn.selected { transform: scale(1.08); }
        .tire-btn .tire-icon { font-size: 1.3rem; margin-bottom: 0.2rem; }
        .tire-btn .tire-name { font-weight: 700; font-size: 0.85rem; }
        .tire-btn .tire-desc { font-size: 0.65rem; color: #94a3b8; margin-top: 0.1rem; }
        .tire-btn.soft { border-color: #ef4444; }
        .tire-btn.soft.selected { background: #451a1a; border-color: #ef4444; }
        .tire-btn.medium { border-color: #f59e0b; }
        .tire-btn.medium.selected { background: #45351a; border-color: #f59e0b; }
        .tire-btn.wet { border-color: #3b82f6; }
        .tire-btn.wet.selected { background: #1a2545; border-color: #3b82f6; }
        .start-btn { padding: 0.8rem 2.5rem; border: none; border-radius: 8px; background: linear-gradient(135deg, #ef4444, #dc2626); color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .start-btn:hover { transform: scale(1.05); }
        .records { background: rgba(30,41,59,0.95); border: 1px solid #334155; border-radius: 8px; padding: 0.8rem; min-width: 260px; max-width: 320px; }
        .records h3 { color: #f59e0b; margin-bottom: 0.4rem; font-size: 0.8rem; }
        .records ol { padding-left: 1.2rem; }
        .records li { color: #94a3b8; font-size: 0.8rem; padding: 1px 0; }
        .records li:first-child { color: #f59e0b; font-weight: 700; }

        @media (max-width: 768px) {
            .on-screen-controls { display: flex; }
            .overlay-screen h1 { font-size: 1.3rem; }
            .speed-gauge { bottom: 75px; }
        }
        .controls-hint { position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%); z-index: 5; color: #475569; font-size: 0.7rem; white-space: nowrap; }
        @media (max-width: 768px) { .controls-hint { display: none; } }
    </style>
</head>
<body>
    <header>
        <a href="../games.html" class="back-btn"><i class="fas fa-arrow-left"></i> GAMES</a>
        <div class="game-title">F1 <span>MONACO GP</span></div>
    </header>

    <canvas id="gameCanvas"></canvas>

    <div class="hud" id="hud" style="display:none;">
        <div class="hud-item">LAP <b id="hudLap">0/5</b></div>
        <div class="hud-item">TIME <b id="hudTime">00:00.0</b></div>
        <div class="hud-item">BEST <b id="hudBest">--:--.--</b></div>
        <div class="hud-item">TIRE <b id="hudTire">-</b></div>
        <div class="hud-item" id="hudWearBox">WEAR <b id="hudWear">100%</b></div>
    </div>
    <div class="hud-right" id="hudRight" style="display:none;">
        <div class="hud-item"><span id="hudWeather">☀️</span> <b id="hudWeatherText">DRY</b></div>
        <div class="hud-item">POS <b id="hudPos">10/10</b></div>
    </div>
    <div class="speed-gauge" id="speedGauge" style="display:none;">
        <div class="speed-val" id="speedVal">0</div>
        <div class="speed-unit">km/h</div>
    </div>

    <div class="on-screen-controls" id="mobileControls">
        <div class="ctrl-group vert">
            <button class="ctrl-btn" id="btnLeft"><i class="fas fa-chevron-left"></i></button>
            <button class="ctrl-btn" id="btnRight"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="ctrl-group vert">
            <button class="ctrl-btn accel" id="btnAccel"><i class="fas fa-chevron-up"></i></button>
            <button class="ctrl-btn brake" id="btnBrake"><i class="fas fa-chevron-down"></i></button>
        </div>
    </div>

    <div class="controls-hint">W/↑ 加速 | S/↓ 刹车 | A/← 左转 | D/→ 右转 | 入弯过快会打滑！</div>

    <div class="overlay-screen" id="startScreen">
        <h1>F1 <span>MONACO GP</span></h1>
        <p>5 圈计时赛 · 动态天气 · 多轮胎策略 · AI 碰撞</p>
        <div style="color:#64748b; font-size:0.75rem;">选择轮胎策略</div>
        <div class="tire-select">
            <button class="tire-btn soft" onclick="selectTire('soft',this)">
                <div class="tire-icon">🔴</div><div class="tire-name">SOFT</div><div class="tire-desc">最快 · 磨损快</div>
            </button>
            <button class="tire-btn medium selected" onclick="selectTire('medium',this)">
                <div class="tire-icon">🟡</div><div class="tire-name">MEDIUM</div><div class="tire-desc">平衡 · 推荐</div>
            </button>
            <button class="tire-btn wet" onclick="selectTire('wet',this)">
                <div class="tire-icon">🔵</div><div class="tire-name">WET</div><div class="tire-desc">湿地专用</div>
            </button>
        </div>
        <button class="start-btn" onclick="startRace()">START RACE</button>
        <div class="records"><h3><i class="fas fa-trophy"></i> 圈速记录</h3><ol id="recordsList"><li style="color:#647489;">暂无记录</li></ol></div>
    </div>

    <div class="overlay-screen" id="endScreen" style="display:none;">
        <h1>RACE <span>COMPLETE</span></h1>
        <div style="font-size:1.8rem; color:#60a5fa; font-weight:800;" id="endTotal">--:--.--</div>
        <div style="font-size:1rem; color:#94a3b8;" id="endPos">第 10 名</div>
        <div style="font-size:0.8rem; color:#64748b;" id="endBest">最佳圈: --:--.--</div>
        <button class="start-btn" onclick="backToStart()" style="font-size:0.9rem; padding:0.7rem 2rem; margin-top:0.5rem;">返回</button>
    </div>

    <script>
    // ============ TRACK ============
    // Monaco-inspired circuit - coordinates designed for zoom=1.0 view
    const TRACK = [
        {x:700,y:500},{x:780,y:490},{x:860,y:470},{x:930,y:440},{x:980,y:400},
        {x:1010,y:350},{x:1020,y:290},{x:1015,y:230},{x:1000,y:180},{x:975,y:140},
        {x:940,y:110},{x:900,y:90},{x:860,y:80},{x:820,y:78},{x:780,y:85},
        {x:740,y:100},{x:710,y:120},{x:680,y:150},{x:660,y:190},{x:650,y:240},
        {x:645,y:290},{x:640,y:340},{x:635,y:380},{x:630,y:420},{x:640,y:460},
        {x:660,y:490},{x:690,y:510},{x:700,y:500},
    ];

    let trackLen = 0;
    const T_DIST = [0], T_ANG = [], T_CURV = [];
    for (let i = 0; i < TRACK.length; i++) {
        const a = TRACK[i], b = TRACK[(i+1) % TRACK.length];
        const dx = b.x - a.x, dy = b.y - a.y;
        trackLen += Math.sqrt(dx*dx + dy*dy);
        T_DIST.push(trackLen);
        T_ANG.push(Math.atan2(dy, dx));
    }
    for (let i = 0; i < TRACK.length; i++) {
        let d = T_ANG[(i+1)%TRACK.length] - T_ANG[i];
        while (d > Math.PI) d -= Math.PI*2;
        while (d < -Math.PI) d += Math.PI*2;
        T_CURV.push(Math.abs(d));
    }

    function getTrackPos(t) {
        t = ((t % 1) + 1) % 1;
        const d = t * trackLen;
        for (let i = 0; i < TRACK.length; i++) {
            if (T_DIST[i+1] >= d) {
                const sl = T_DIST[i+1] - T_DIST[i];
                const f = sl > 0 ? (d - T_DIST[i]) / sl : 0;
                return { x: TRACK[i].x + (TRACK[(i+1)%TRACK.length].x - TRACK[i].x)*f,
                         y: TRACK[i].y + (TRACK[(i+1)%TRACK.length].y - TRACK[i].y)*f,
                         idx: i };
            }
        }
        return { x: TRACK[0].x, y: TRACK[0].y, idx: 0 };
    }

    function getAngle(t) {
        t = ((t % 1) + 1) % 1;
        const d = t * trackLen;
        for (let i = 0; i < TRACK.length; i++) {
            if (T_DIST[i+1] >= d) return T_ANG[i];
        }
        return T_ANG[0];
    }

    function getCurvature(t) {
        t = ((t % 1) + 1) % 1;
        const d = t * trackLen;
        for (let i = 0; i < TRACK.length; i++) {
            if (T_DIST[i+1] >= d) return T_CURV[i];
        }
        return T_CURV[0];
    }

    // ============ TIRES & WEATHER ============
    const TIRE = {
        soft:   { name:'SOFT', color:'#ef4444', grip:1.12, wear:2.0, wetMult:0.5, dryMult:1.0 },
        medium: { name:'MED',  color:'#f59e0b', grip:1.0,  wear:1.0, wetMult:0.65, dryMult:0.88 },
        wet:    { name:'WET',  color:'#3b82f6', grip:0.8,  wear:0.8, wetMult:1.0, dryMult:0.5 },
    };

    let weather = { progress:0, rain:0, state:'dry' };
    function updateWeather(dt) {
        weather.progress += dt / 240;
        if (weather.progress > 1) weather.progress -= 1;
        const p = weather.progress;
        if (p < 0.55) { weather.state='dry'; weather.rain=0; }
        else if (p < 0.65) { weather.state='rain'; weather.rain=(p-0.55)/0.1; }
        else if (p < 0.8) { weather.state='wet'; weather.rain=1; }
        else { weather.state='drying'; weather.rain=1-(p-0.8)/0.2; }
    }

    function trackGrip() {
        if (weather.state === 'dry') return 1.0;
        if (weather.state === 'wet') return 0.45;
        return 1.0 - weather.rain * 0.4;
    }

    // ============ GAME STATE ============
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let selectedTire = 'medium';
    let gameRunning = false, raceFinished = false;
    const TOTAL_LAPS = 5;

    let player = {};
    let aiCars = [];
    let keys = { up:false, down:false, left:false, right:false };
    let camX = 0, camY = 0, camAng = 0;

    function resetPlayer() {
        player = {
            t: 0, lat: 0, spd: 0, headAng: 0,
            maxSpd: 7.5, accel: 0.12, brake: 0.18,
            lap: 0, lapTime: 0, bestLap: Infinity, totalTime: 0,
            wear: 100, spinning: 0, finishTime: 0
        };
    }

    function initAI() {
        const names = ['VER','NOR','LEC','HAM','SAI','RUS','PIA','ALO','GAS'];
        const colors = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#f97316','#14b8a6','#a855f7'];
        const tires = ['medium','soft','medium','wet','soft','medium','soft','wet','medium'];
        const speeds = [6.8,6.4,6.0,5.6,5.3,5.0,4.7,4.4,4.1];
        aiCars = [];
        for (let i = 0; i < 9; i++) {
            aiCars.push({
                t: 0.03 + i*0.012, lat: -0.3 + Math.random()*0.6,
                spd: speeds[i], maxSpd: speeds[i], headAng: 0,
                color: colors[i], tire: tires[i], name: names[i],
                lap: 0, lapTime: 0, bestLap: Infinity, totalTime: 0, spinning: 0, finishTime: 0
            });
        }
    }

    // ============ INPUT ============
    document.addEventListener('keydown', e => {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D'].includes(e.key)) e.preventDefault();
        if (e.key==='ArrowUp'||e.key==='w'||e.key==='W') keys.up=true;
        if (e.key==='ArrowDown'||e.key==='s'||e.key==='S') keys.down=true;
        if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=true;
        if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
    });
    document.addEventListener('keyup', e => {
        if (e.key==='ArrowUp'||e.key==='w') keys.up=false;
        if (e.key==='ArrowDown'||e.key==='s') keys.down=false;
        if (e.key==='ArrowLeft'||e.key==='a') keys.left=false;
        if (e.key==='ArrowRight'||e.key==='d') keys.right=false;
    });

    function setupBtn(id, key) {
        const b = document.getElementById(id);
        b.addEventListener('touchstart', e => { e.preventDefault(); keys[key]=true; });
        b.addEventListener('touchend', e => { e.preventDefault(); keys[key]=false; });
        b.addEventListener('mousedown', () => keys[key]=true);
        b.addEventListener('mouseup', () => keys[key]=false);
        b.addEventListener('mouseleave', () => keys[key]=false);
    }
    setupBtn('btnLeft','left'); setupBtn('btnRight','right');
    setupBtn('btnAccel','up'); setupBtn('btnBrake','down');

    // ============ GAME ============
    function selectTire(t, el) {
        selectedTire = t;
        document.querySelectorAll('.tire-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
    }

    function loadRecords() {
        const r = JSON.parse(localStorage.getItem('f1MonRecs') || '[]');
        const list = document.getElementById('recordsList');
        if (!r.length) list.innerHTML = '<li style="color:#647489;">暂无记录</li>';
        else list.innerHTML = r.slice(0,5).map(x => `<li>${fmt(x.t)} — ${x.tire}</li>`).join('');
    }

    function saveRecord(ms) {
        const r = JSON.parse(localStorage.getItem('f1MonRecs') || '[]');
        r.push({ t:ms, tire: TIRE[selectedTire].name, d: Date.now() });
        r.sort((a,b) => a.t - b.t);
        localStorage.setItem('f1MonRecs', JSON.stringify(r.slice(0,10)));
    }

    function fmt(ms) {
        const s = ms/1000, m = Math.floor(s/60), sec = Math.floor(s%60), frac = Math.floor((ms%1000)/10);
        return `${m}:${String(sec).padStart(2,'0')}.${String(frac).padStart(2,'0')}`;
    }

    function startRace() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('endScreen').style.display = 'none';
        document.getElementById('hud').style.display = '';
        document.getElementById('hudRight').style.display = '';
        document.getElementById('speedGauge').style.display = '';
        resizeCanvas();
        resetPlayer();
        initAI();
        weather = { progress:0, rain:0, state:'dry' };
        gameRunning = true;
        raceFinished = false;

        // Set camera to track start
        camX = TRACK[0].x;
        camY = TRACK[0].y;
        camAng = T_ANG[0];

        lastTime = performance.now();
        requestAnimationFrame(loop);
    }

    function backToStart() {
        document.getElementById('endScreen').style.display = 'none';
        document.getElementById('startScreen').style.display = 'flex';
        document.getElementById('hud').style.display = 'none';
        document.getElementById('hudRight').style.display = 'none';
        document.getElementById('speedGauge').style.display = 'none';
        loadRecords();
    }

    let lastTime = 0;
    function loop(ts) {
        const dt = Math.min((ts - lastTime) / 1000, 0.05);
        lastTime = ts;
        if (gameRunning && !raceFinished) update(dt);
        render();
        requestAnimationFrame(loop);
    }

    function update(dt) {
        updateWeather(dt);
        const ti = TIRE[selectedTire];
        const tg = trackGrip();
        const grip = ti.grip * tg;

        // Tire wear + corner stress
        const lapCurv = getCurvature(player.t);
        const maxCornerSpd = Math.sqrt(grip / (lapCurv + 0.01));

        // Spin check
        if (player.spd > maxCornerSpd * 1.3 && lapCurv > 0.1) {
            if (player.spinning <= 0) {
                player.spinning = 0.8;
                player.headAng += (Math.random() > 0.5 ? 1 : -1) * 1.2;
            }
        }

        if (player.spinning > 0) {
            player.spinning -= dt;
            player.headAng += dt * 6;
            player.spd *= 0.96;
        } else {
            player.spinning = 0;
            if (keys.up) player.spd = Math.min(player.spd + player.accel * grip, player.maxSpd * ti.dryMult * (weather.state==='wet' ? ti.wetMult : 1));
            else if (keys.down) player.spd = Math.max(player.spd - player.brake, -2);
            else player.spd *= 0.985;

            if (keys.left) player.lat -= 0.012 * grip;
            if (keys.right) player.lat += 0.012 * grip;
        }

        player.lat = Math.max(-1.2, Math.min(1.2, player.lat));
        if (Math.abs(player.lat) > 0.85) {
            player.spd *= (1 - 0.05 * (Math.abs(player.lat) - 0.85));
            if (Math.abs(player.lat) > 1.1) player.lat = Math.sign(player.lat) * 1.05;
        }

        // Wear
        const cornerStress = Math.max(0, lapCurv * player.spd * player.spd - grip) * 2;
        const wearRate = ti.wear * (1 + cornerStress * 0.5) * 0.5;
        player.wear = Math.max(0, player.wear - dt * wearRate);
        const wearPenalty = player.wear < 15 ? 0.5 : player.wear < 40 ? 0.75 : 1;

        // Move
        player.t += player.spd * wearPenalty / trackLen;
        if (player.t >= 1) {
            player.t -= 1;
            if (player.lapTime > 0 && player.lap >= 1) {
                if (player.lapTime < player.bestLap) player.bestLap = player.lapTime;
                saveRecord(player.lapTime);
            }
            player.lap++;
            player.lapTime = 0;
            if (player.lap > TOTAL_LAPS) {
                raceFinished = true;
                player.finishTime = player.totalTime;
                endRace();
                return;
            }
        }
        player.lapTime += dt * 1000;
        player.totalTime += dt * 1000;
        if (player.spinning <= 0) player.headAng = getAngle(player.t);

        // AI
        aiCars.forEach(ai => {
            const aiTi = TIRE[ai.tire];
            const aiGrip = aiTi.grip * tg;
            const aiCorner = getCurvature(ai.t);
            const aiMaxCorner = Math.sqrt(aiGrip / (aiCorner + 0.01));

            if (ai.spd > aiMaxCorner * 1.2 && aiCorner > 0.1) {
                if (ai.spinning <= 0) { ai.spinning = 0.6 + Math.random()*0.4; ai.headAng += (Math.random()>0.5?1:-1)*0.8; }
            }
            if (ai.spinning > 0) {
                ai.spinning -= dt; ai.headAng += dt*5; ai.spd *= 0.95;
            } else {
                ai.spinning = 0;
                ai.spd += (Math.random()-0.5)*0.15;
                const aiWet = weather.state==='wet' ? aiTi.wetMult : aiTi.dryMult;
                ai.spd = Math.max(3, Math.min(ai.maxSpd * aiGrip * aiWet, ai.spd));
            }
            ai.lat += (Math.random()-0.5)*0.008;
            ai.lat = Math.max(-0.8, Math.min(0.8, ai.lat));
            ai.t += ai.spd / trackLen;
            if (ai.t >= 1) {
                ai.t -= 1; ai.lap++;
                if (ai.lapTime>0 && ai.lap>=1 && ai.lapTime < ai.bestLap) ai.bestLap = ai.lapTime;
                ai.lapTime = 0;
                if (ai.lap > TOTAL_LAPS && !ai.finishTime) ai.finishTime = ai.totalTime;
            }
            ai.lapTime += dt*1000;
            if (ai.spinning <= 0) ai.headAng = getAngle(ai.t);

            // Collision
            if (player.spinning<=0 && ai.spinning<=0) {
                const dt2 = Math.abs(player.t - ai.t);
                const dl = Math.abs(player.lat - ai.lat);
                if (dt2 < 0.005 && dl < 0.25) {
                    player.spinning = 1.0; player.spd *= 0.2;
                    player.headAng += (player.lat > ai.lat ? 1 : -1) * 1.5;
                    ai.spinning = 0.8; ai.spd *= 0.4;
                }
            }
        });

        updateHUD();
    }

    function updateHUD() {
        document.getElementById('hudLap').textContent = `${Math.min(player.lap,TOTAL_LAPS)}/${TOTAL_LAPS}`;
        document.getElementById('hudTime').textContent = fmt(player.lapTime);
        document.getElementById('hudBest').textContent = player.bestLap < Infinity ? fmt(player.bestLap) : '--:--.--';
        const ti = TIRE[selectedTire];
        const te = document.getElementById('hudTire');
        te.textContent = ti.name; te.style.color = ti.color;
        const we = document.getElementById('hudWear');
        we.textContent = `${Math.round(player.wear)}%`;
        document.getElementById('hudWearBox').className = 'hud-item' + (player.wear<15?' danger':player.wear<40?' warn':'');
        const wi = document.getElementById('hudWeather');
        const wt = document.getElementById('hudWeatherText');
        if(weather.state==='dry'){wi.textContent='☀️';wt.textContent='DRY';}
        else if(weather.state==='rain'){wi.textContent='🌧️';wt.textContent='RAIN';}
        else if(weather.state==='wet'){wi.textContent='🌧️';wt.textContent='WET';}
        else{wi.textContent='🌤️';wt.textContent='DRYING';}
        const pTotal = player.lap + player.t;
        let pos = 1;
        aiCars.forEach(a => { if(a.lap+a.t > pTotal) pos++; });
        document.getElementById('hudPos').textContent = `${pos}/${aiCars.length+1}`;
        document.getElementById('speedVal').textContent = Math.round(player.spd * 40);
    }

    function endRace() {
        gameRunning = false;
        const pT = player.lap + player.t;
        let pos = 1;
        aiCars.forEach(a => { if(a.lap+a.t > pT) pos++; });
        document.getElementById('endTotal').textContent = fmt(player.finishTime || player.totalTime);
        document.getElementById('endPos').textContent = `第 ${pos} 名 / ${aiCars.length+1}`;
        document.getElementById('endBest').textContent = player.bestLap < Infinity ? `最佳圈: ${fmt(player.bestLap)}` : '';
        setTimeout(() => { document.getElementById('endScreen').style.display = 'flex'; }, 600);
    }

    // ============ RENDER ============
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 44;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function render() {
        const W = canvas.width, H = canvas.height;

        // Safety: ensure canvas has valid dimensions
        if (W <= 0 || H <= 0) return;

        // Fill background
        ctx.fillStyle = '#0a0e17';
        ctx.fillRect(0, 0, W, H);

        // Player position
        const pp = getTrackPos(player.t);

        // Camera follow
        if (camX === 0 && camY === 0) {
            camX = TRACK[0].x;
            camY = TRACK[0].y;
            camAng = T_ANG[0];
        }

        camX += (pp.x - camX) * 0.12;
        camY += (pp.y - camY) * 0.12;
        if (player.spinning <= 0) camAng = player.headAng;

        // Render transform
        ctx.save();
        ctx.translate(W/2, H/2);
        ctx.rotate(-camAng + Math.PI/2);
        ctx.scale(1.0, 1.0); // No zoom scaling - track is right-sized
        ctx.translate(-camX, -camY);

        // Grass
        ctx.fillStyle = '#1a2332';
        ctx.fillRect(camX - 600, camY - 400, 1200, 800);

        // Track surface
        ctx.strokeStyle = '#3d4f63';
        ctx.lineWidth = 72;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        TRACK.forEach((p, i) => i===0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.stroke();

        // Track edge
        ctx.strokeStyle = '#6b7c8f';
        ctx.lineWidth = 68;
        ctx.beginPath();
        TRACK.forEach((p, i) => i===0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.stroke();

        // Racing surface
        ctx.strokeStyle = '#2d3748';
        ctx.lineWidth = 58;
        ctx.beginPath();
        TRACK.forEach((p, i) => i===0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.stroke();

        // Center dashed line
        ctx.strokeStyle = '#4a5568';
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 12]);
        ctx.beginPath();
        TRACK.forEach((p, i) => i===0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.stroke();
        ctx.setLineDash([]);

        // Start/Finish line
        ctx.save();
        ctx.translate(TRACK[0].x, TRACK[0].y);
        ctx.rotate(T_ANG[0] + Math.PI/2);
        for (let r = -30; r < 30; r += 5) {
            for (let c = 0; c < 2; c++) {
                ctx.fillStyle = (r + c*5) % 10 === 0 ? '#fff' : '#111';
                ctx.fillRect(r, c*3 - 2, 5, 3);
            }
        }
        ctx.restore();

        // Rain
        if (weather.rain > 0) {
            ctx.strokeStyle = `rgba(150,200,255,${weather.rain*0.2})`;
            ctx.lineWidth = 1;
            for (let i = 0; i < 60; i++) {
                const rx = camX + (Math.random()-0.5)*500;
                const ry = camY + (Math.random()-0.5)*400;
                ctx.beginPath();
                ctx.moveTo(rx, ry);
                ctx.lineTo(rx-2, ry+10);
                ctx.stroke();
            }
        }

        // AI cars
        aiCars.forEach(ai => {
            const ap = getTrackPos(ai.t);
            ctx.save();
            ctx.translate(ap.x + ai.lat*24, ap.y);
            ctx.rotate(ai.headAng + Math.PI);
            drawCar(14, 7, ai.color);
            ctx.restore();
            ctx.save();
            ctx.translate(ap.x + ai.lat*24, ap.y);
            ctx.fillStyle = '#e2e8f0';
            ctx.font = 'bold 9px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(ai.name, 0, -12);
            if (ai.spinning > 0) { ctx.fillStyle='#ef4444'; ctx.fillText('💫', 0, -22); }
            ctx.restore();
        });

        // Player car
        ctx.save();
        ctx.translate(pp.x + player.lat*24, pp.y);
        ctx.rotate(player.headAng + Math.PI);
        if (player.spinning > 0) ctx.globalAlpha = 0.5 + Math.sin(Date.now()/80)*0.3;
        drawCar(16, 8, '#ef4444');
        ctx.restore();

        // Player label
        ctx.save();
        ctx.translate(pp.x + player.lat*24, pp.y);
        ctx.fillStyle = '#ef4444';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('YOU', 0, -16);
        if (player.spinning > 0) { ctx.fillStyle='#f59e0b'; ctx.font='14px sans-serif'; ctx.fillText('💥 SPIN!', 0, -28); }
        ctx.restore();

        ctx.restore();

        // Off-track warning
        if (Math.abs(player.lat) > 0.85) {
            ctx.fillStyle = `rgba(239,68,68,${0.3*Math.abs(player.lat)})`;
            ctx.fillRect(0, 0, W, H);
        }
    }

    function drawCar(w, h, color) {
        ctx.save();
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(2, 3, w*0.7, h*0.5, 0, 0, Math.PI*2);
        ctx.fill();
        // Body
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(w*0.9, 0);
        ctx.lineTo(w*0.3, -h);
        ctx.lineTo(-w*0.6, -h*0.7);
        ctx.lineTo(-w, -h*0.4);
        ctx.lineTo(-w, h*0.4);
        ctx.lineTo(-w*0.6, h*0.7);
        ctx.lineTo(w*0.3, h);
        ctx.closePath();
        ctx.fill();
        // Cockpit
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(-w*0.1, -h*0.5, w*0.5, h);
        // Front wing
        ctx.fillStyle = color;
        ctx.fillRect(w*0.6, -h*1.2, w*0.25, h*2.4);
        // Rear wing
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(-w*0.9, -h*0.7, w*0.15, h*1.4);
        // Wheels
        ctx.fillStyle = '#111';
        ctx.fillRect(w*0.4, -h*1.1, w*0.15, h*0.3);
        ctx.fillRect(w*0.4, h*0.8, w*0.15, h*0.3);
        ctx.fillRect(-w*0.7, -h*0.5, w*0.15, h*0.25);
        ctx.fillRect(-w*0.7, h*0.25, w*0.15, h*0.25);
        ctx.restore();
    }

    loadRecords();
    </script>
</body>
