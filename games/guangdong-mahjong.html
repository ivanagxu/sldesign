    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .hand { display: flex; flex-wrap: wrap; gap: 1px; justify-content: center; min-height: 34px; align-items: center; }

        .tile.face-down { background: #2d5a2d; border-color: #1a3a1a; color: #3a7a3a; }

        /* 按钮 */
        .action-bar {
            display: flex; justify-content: center; gap: 6px;
            padding: 0.4rem; min-height: 40px; flex-wrap: wrap;

        }

        .b-pong { background: linear-gradient(145deg, #f59e0b, #d97706); color: #fff; }
        .b-chow { background: linear-gradient(145deg, #3b82f6, #2563eb); color: #fff; }

        .b-skip { background: linear-gradient(145deg, #64748b, #475569); color: #fff; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 5px rgba(239,68,68,.3)} 50%{box-shadow:0 0 15px rgba(239,68,68,.6)} }

        /* 弹窗 */

        /* 开始画面 */
        .start-screen {

            background: linear-gradient(135deg, #0a2a0a, #1a3a1a);

        .start-screen h1 { font-size: 2.2rem; color: #fbbf24; margin-bottom: 0.5rem; }

            .tile { width: 20px; height: 26px; font-size: 8px; }
            .side-area { width: 28%; }
        }

<header>

<script>
// ==================== 牌具 ====================
const SW = '万', ST = '筒', STIAO = '条';
const WINDS = ['东','南','西','北'], DRAGONS = ['中','发','白'];

function makeWall() {
    const w = [];
    for (const s of ['wan','tong','tiao']) {
        for (let v = 1; v <= 9; v++)
            for (let i = 0; i < 4; i++) w.push({ s, v });
    }
    for (let v = 0; v < 4; v++)
        for (let i = 0; i < 4; i++) w.push({ s: 'wind', v });
    for (let v = 0; v < 3; v++)
        for (let i = 0; i < 4; i++) w.push({ s: 'dragon', v });
    return w;
}

function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function tStr(t) {
    if (t.s === 'wind') return WINDS[t.v];
    if (t.s === 'dragon') return DRAGONS[t.v];
    return t.v + {wan:SW,tong:ST,tiao:STIAO}[t.s];
}

function tEq(a, b) { return a.s === b.s && a.v === b.v; }

function tVal(t) {
    return {wan:0,tong:10,tiao:20,wind:30,dragon:40}[t.s] + t.v;
}

function sortHand(h) { h.sort((a, b) => tVal(a) - tVal(b)); }

// ==================== 渲染 ====================
function rTile(t, cls = '') {
    let sc = '';
    if (t.s === 'wan') sc = 'sw';
    else if (t.s === 'tong') sc = 'st';
    else if (t.s === 'tiao') sc = 'stiao';
    else if (t.s === 'wind') sc = 'sf';
    else sc = 'sd';
    return `<div class="tile ${cls}"><span class="${sc}">${tStr(t)}</span></div>`;
}
function rTileFD(cls = '') { return `<div class="tile face-down ${cls}">🀫</div>`; }

// ==================== 胡牌检测 ====================
function canWin(hand) {
    if (hand.length !== 14) return false;
    // 转换为计数表
    const cnt = {};
    hand.forEach(t => { const k = t.s + '_' + t.v; cnt[k] = (cnt[k] || 0) + 1; });

    // 生成有序牌列表
    const tiles = hand.slice().sort((a, b) => tVal(a) - tVal(b));

    function match(groups) {
        if (groups === 4) return true;
        // 找第一张未使用的牌
        let first = null;
        for (const t of tiles) {
            const k = t.s + '_' + t.v;
            if (cnt[k] > 0) { first = t; break; }
        }
        if (!first) return false;
        const k = first.s + '_' + first.v;

        // 尝试刻子
        if (cnt[k] >= 3) {
            cnt[k] -= 3;
            if (match(groups + 1)) { cnt[k] += 3; return true; }
            cnt[k] += 3;
        }
        // 尝试顺子 (仅限数字牌)
        if (first.s !== 'wind' && first.s !== 'dragon' && first.v <= 7) {
            const k2 = first.s + '_' + (first.v + 1);
            const k3 = first.s + '_' + (first.v + 2);
            if ((cnt[k2] || 0) >= 1 && (cnt[k3] || 0) >= 1) {
                cnt[k]--; cnt[k2]--; cnt[k3]--;
                if (match(groups + 1)) { cnt[k]++; cnt[k2]++; cnt[k3]++; return true; }
                cnt[k]++; cnt[k2]++; cnt[k3]++;
            }
        }
        return false;
    }
    return match(0);
}

function canWinWith(hand, tile) {
    return canWin([...hand, tile]);
}

// ==================== 操作检测 ====================
function countInHand(player, tile) {
    return player.hand.filter(t => tEq(t, tile)).length;
}

function getPongOptions(player, tile) {
    return countInHand(player, tile) >= 2;
}

function getKongOptions(player, tile) {
    return countInHand(player, tile) >= 3;
}

function getChowOptions(player, tile) {
    if (tile.s === 'wind' || tile.s === 'dragon') return [];
    const opts = [];
    const h = player.hand;
    const has = (s, v) => h.some(t => t.s === s && t.v === v);

    // (v-2,v-1,v)
    if (tile.v >= 3 && has(tile.s, tile.v-2) && has(tile.s, tile.v-1))
        opts.push([{s:tile.s,v:tile.v-2},{s:tile.s,v:tile.v-1},tile]);
    // (v-1,v,v+1)
    if (tile.v >= 2 && tile.v <= 8 && has(tile.s, tile.v-1) && has(tile.s, tile.v+1))
        opts.push([{s:tile.s,v:tile.v-1},tile,{s:tile.s,v:tile.v+1}]);
    // (v,v+1,v+2)
    if (tile.v <= 7 && has(tile.s, tile.v+1) && has(tile.s, tile.v+2))
        opts.push([tile,{s:tile.s,v:tile.v+1},{s:tile.s,v:tile.v+2}]);
    return opts;
}

// ==================== 游戏状态 ====================
const NAMES = ['你', '上家', '对家', '下家'];
const ICONS = ['fa-user', 'fa-robot', 'fa-robot', 'fa-robot'];

let G; // 游戏状态

function initState() {
    return {
        wall: [],
        players: [
            { hand: [], melds: [], score: 0, isAI: false },
            { hand: [], melds: [], score: 0, isAI: true },
            { hand: [], melds: [], score: 0, isAI: true },
            { hand: [], melds: [], score: 0, isAI: true },
        ],
        dealer: 0,
        cur: 0,
        lastDiscard: null, // { tile, from }
        discards: [],
        round: 1,
        gameOver: false,
        selectedIdx: -1,
        humanCanAct: false,
        pendingAction: null,
        lastWinner: -1,
        humanPhase: 'idle', // idle | select-discard | waiting
    };
}

function initGame() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('table').style.display = '';
    G = initState();
    G.dealer = Math.floor(Math.random() * 4);
    startRound();
}

function startRound() {
    G.wall = shuffle(makeWall());
    G.players.forEach(p => { p.hand = []; p.melds = []; });
    G.discards = [];
    G.lastDiscard = null;
    G.gameOver = false;
    G.humanCanAct = false;
    G.pendingAction = null;
    G.selectedIdx = -1;
    G.humanPhase = 'idle';
    hideActions();

    // 发牌
    for (let i = 0; i < 4; i++) {
        const n = (i === G.dealer) ? 14 : 13;
        for (let j = 0; j < n; j++) G.players[i].hand.push(G.wall.pop());
        sortHand(G.players[i].hand);
    }

    G.cur = G.dealer;
    render();
    setSt(NAMES[G.cur] + '的回合');

    if (G.players[G.cur].isAI) {
        setTimeout(() => aiPlay(), 600);
    } else {
        G.humanPhase = 'select-discard';
        setSt('你的回合 - 点击手牌出牌');
    }
}

// ==================== 核心流程 ====================
function drawTile(pIdx) {
    if (G.wall.length === 0) {
        endDraw();
        return null;
    }
    const tile = G.wall.pop();
    G.players[pIdx].hand.push(tile);
    sortHand(G.players[pIdx].hand);
    return tile;
}

function startTurn(pIdx) {
    G.cur = pIdx;
    G.selectedIdx = -1;
    hideActions();
    G.humanCanAct = false;

    const tile = drawTile(pIdx);
    if (!tile) return;
    render();

    // 检查自摸
    if (canWin(G.players[pIdx].hand)) {
        if (pIdx === 0) {
            showActions(0, { win: true });
            G.humanCanAct = true;
            G.pendingAction = { type: 'self-win' };
            setSt('可以自摸！');
        } else {
            doWin(pIdx, tile, pIdx, true, false);
        }
        return;
    }

    if (G.players[pIdx].isAI) {
        setTimeout(() => aiDiscard(), 500);
    } else {
        G.humanPhase = 'select-discard';
        setSt('你的回合 - 点击手牌选中并出牌');
    }
}

function doDiscard(pIdx, tileIdx) {
    // 多重防护：防止任何情况下重复出牌
    if (G.gameOver) return;
    if (G.players[pIdx].hand.length <= tileIdx) return;
    if (G.players[pIdx].isAI && G.humanPhase !== 'waiting') return;
    
    const p = G.players[pIdx];
    const tile = p.hand.splice(tileIdx, 1)[0];
    G.lastDiscard = { tile, from: pIdx };
    G.discards.push(tile);
    G.selectedIdx = -1;
    G.humanPhase = 'waiting';
    render();
    setSt('等待响应...');

    // 加延迟让浏览器渲染，避免瞬间连出多张牌
    setTimeout(() => checkResponses(tile, pIdx), pIdx === 0 ? 300 : 200);
}

function checkResponses(tile, from) {
    // 优先级: 胡 > 杠 > 碰 > 吃(仅上家)
    let bestPriority = 0, bestActions = [];

    for (let p = 0; p < 4; p++) {
        if (p === from) continue;
        const pl = G.players[p];

        // 胡
        if (canWinWith(pl.hand, tile)) {
            if (p > bestPriority || (p === 0 && bestPriority <= 4)) {
                bestPriority = 4;
                bestActions = [{ p, type: 'win' }];
            } else if (p === 0) {
                bestActions.push({ p, type: 'win' });
            }
        }
    }
    if (bestPriority === 4) {
        const humanCanWin = bestActions.some(a => a.p === 0);
        const aiWinners = bestActions.filter(a => a.p !== 0);

        if (humanCanWin) {
            showActions(0, { win: true });
            G.humanCanAct = true;
            G.pendingAction = { type: 'win', tile, from };
            setSt('可以胡牌！');
            return;
        }
        if (aiWinners.length > 0) {
            // AI 胡牌 (放炮)
            doWin(aiWinners[0].p, tile, from, false, false);
            return;
        }
    }

    // 杠 (任何玩家)
    for (let p = 0; p < 4; p++) {
        if (p === from) continue;
        if (getKongOptions(G.players[p], tile)) {
            if (p === 0) {
                showActions(0, { kong: true, skip: true });
                G.humanCanAct = true;
                G.pendingAction = { type: 'kong', tile, from };
                setSt('可以杠！');
                return;
            } else {
                doKong(p, tile, from);
                return;
            }
        }
    }

    // 碰 (任何玩家)
    for (let p = 0; p < 4; p++) {
        if (p === from) continue;
        if (getPongOptions(G.players[p], tile)) {
            if (p === 0) {
                showActions(0, { pong: true, skip: true });
                G.humanCanAct = true;
                G.pendingAction = { type: 'pong', tile, from };
                setSt('可以碰！');
                return;
            } else {
                doPong(p, tile, from);
                return;
            }
        }
    }

    // 吃 (仅下家可以吃上家的牌)
    const nextP = (from + 1) % 4;
    const chowOpts = getChowOptions(G.players[nextP], tile);
    if (chowOpts.length > 0) {
        if (nextP === 0) {
            if (chowOpts.length === 1) {
                showActions(0, { chow: true, skip: true });
            } else {
                showChowModal(chowOpts);
            }
            G.humanCanAct = true;
            G.pendingAction = { type: 'chow', tile, from, options: chowOpts };
            setSt('可以吃！');
            return;
        } else {
            doChow(nextP, tile, from, chowOpts[0]);
            return;
        }
    }

    // 无响应，加延迟后轮到下家
    setTimeout(() => {
        if (!G.gameOver) startTurn((from + 1) % 4);
    }, 400);
}

// ==================== 执行操作 ====================
function doPong(pIdx, tile, from) {
    const p = G.players[pIdx];
    let removed = 0;
    p.hand = p.hand.filter(t => {
        if (removed < 2 && tEq(t, tile)) { removed++; return false; }
        return true;
    });
    p.melds.push({ type: 'pong', tiles: [tile, tile, tile] });
    G.lastDiscard = null;

    // 碰后摸一张牌
    if (G.wall.length > 0) {
        p.hand.push(G.wall.pop());
        sortHand(p.hand);
    }
    render();
    setSt(NAMES[pIdx] + ' 碰！摸牌后请出牌');

    if (p.isAI) {
        setTimeout(() => aiDiscard(), 500);
    } else {
        G.cur = pIdx;
        G.humanPhase = 'select-discard';
        setSt('碰！摸牌后请点击手牌出牌');
    }
}

function doChow(pIdx, tile, from, chowTiles) {
    const p = G.players[pIdx];
    const need = chowTiles.filter(t => !tEq(t, tile));
    let removed = 0;
    p.hand = p.hand.filter(t => {
        for (const n of need) {
            if (removed < need.length && tEq(t, n)) { removed++; return false; }
        }
        return true;
    });
    p.melds.push({ type: 'chow', tiles: [...chowTiles] });
    G.lastDiscard = null;
    render();
    setSt(NAMES[pIdx] + ' 吃！请选择出牌');

    if (p.isAI) {
        setTimeout(() => aiDiscard(), 500);
    } else {
        G.cur = pIdx;
        G.humanPhase = 'select-discard';
        setSt('吃！请点击手牌出牌');
    }
}

function doKong(pIdx, tile, from) {
    const p = G.players[pIdx];
    let removed = 0;
    p.hand = p.hand.filter(t => {
        if (removed < 3 && tEq(t, tile)) { removed++; return false; }
        return true;
    });
    p.melds.push({ type: 'kong', tiles: [tile, tile, tile, tile] });
    G.lastDiscard = null;

    // 杠后补牌
    if (G.wall.length > 0) {
        p.hand.push(G.wall.pop());
        sortHand(p.hand);
    }
    render();

    // 杠上开花
    if (canWin(p.hand)) {
        doWin(pIdx, tile, pIdx, true, true);
        return;
    }

    setSt(NAMES[pIdx] + ' 杠！补牌后出牌');
    if (p.isAI) {
        setTimeout(() => aiDiscard(), 500);
    } else {
        G.cur = pIdx;
        G.humanPhase = 'select-discard';
        setSt('杠！补牌后请出牌');
    }
}

function doWin(pIdx, tile, from, selfDrawn, kongBloom) {
    G.gameOver = true;
    G.lastWinner = pIdx;
    G.players[pIdx].score += (selfDrawn ? 3 : 3) * (kongBloom ? 2 : 1);

    let desc = '';
    let changes = {};

    if (selfDrawn) {
        const pts = kongBloom ? 2 : 1;
        desc = `${NAMES[pIdx]} 自摸！${kongBloom ? '杠上开花' : ''} +${pts}分/人`;
        for (let i = 0; i < 4; i++) {
            G.players[i].score += (i === pIdx ? 3 * pts : -pts);
            changes[i] = (i === pIdx ? '+' : '') + 3 * pts;
        }
    } else {
        const pts = kongBloom ? 2 : 1;
        desc = `${NAMES[pIdx]} 胡了 ${NAMES[from]} 的牌！${kongBloom ? '抢杠胡' : '放炮'}`;
        for (let i = 0; i < 4; i++) changes[i] = '0';
        G.players[pIdx].score += 3 * pts;
        G.players[from].score -= 3 * pts;
        changes[pIdx] = '+' + 3 * pts;
        changes[from] = '-' + 3 * pts;
    }

    showWinOverlay(desc, changes);
    render();
}

function endDraw() {
    G.gameOver = true;
    document.getElementById('draw-desc').textContent = '牌已摸完，无人胡牌，庄家连庄';
    document.getElementById('draw-overlay').classList.add('show');
}

// ==================== AI ====================
function aiDiscard() {
    if (G.gameOver) return;
    const p = G.players[G.cur];
    const idx = aiChooseDiscard(p);
    doDiscard(G.cur, idx);
}

function aiPlay() {
    if (G.gameOver) return;
    startTurn(G.cur);
}

function aiChooseDiscard(player) {
    const h = player.hand;
    const cnt = {};
    h.forEach(t => { const k = t.s + '_' + t.v; cnt[k] = (cnt[k] || 0) + 1; });

    // 1. 优先打孤张字牌
    for (let i = 0; i < h.length; i++) {
        if ((h[i].s === 'wind' || h[i].s === 'dragon') && cnt[h[i].s + '_' + h[i].v] === 1)
            return i;
    }
    // 2. 打孤张数字牌
    for (let i = 0; i < h.length; i++) {
        if (h[i].s !== 'wind' && h[i].s !== 'dragon') {
            const hasNbr = h.some((t, j) => j !== i && t.s === h[i].s && Math.abs(t.v - h[i].v) <= 2);
            if (!hasNbr) return i;
        }
    }
    // 3. 默认最后
    return h.length - 1;
}

// ==================== UI 操作 ====================
function showActions(pIdx, acts) {
    ['btn-pong','btn-chow','btn-kong','btn-win','btn-skip'].forEach(id => {
        document.getElementById(id).style.display = 'none';
    });
    if (acts.pong) { document.getElementById('btn-pong').style.display = ''; document.getElementById('btn-pong').disabled = false; }
    if (acts.chow) { document.getElementById('btn-chow').style.display = ''; document.getElementById('btn-chow').disabled = false; }
    if (acts.kong) { document.getElementById('btn-kong').style.display = ''; document.getElementById('btn-kong').disabled = false; }
    if (acts.win) { document.getElementById('btn-win').style.display = ''; document.getElementById('btn-win').disabled = false; }
    if (acts.skip) { document.getElementById('btn-skip').style.display = ''; document.getElementById('btn-skip').disabled = false; }
}

function hideActions() {
    ['btn-pong','btn-chow','btn-kong','btn-win','btn-skip'].forEach(id => {
        document.getElementById(id).style.display = 'none';
        document.getElementById(id).disabled = true;
    });
}

function setSt(t) { document.getElementById('el-status').textContent = t; }

function actPong() {
    if (!G.humanCanAct) return;
    doPong(0, G.pendingAction.tile, G.pendingAction.from);
    hideActions();
}

function actChow() {
    if (!G.humanCanAct) return;
    if (G.pendingAction.options.length === 1) {
        doChow(0, G.pendingAction.tile, G.pendingAction.from, G.pendingAction.options[0]);
    }
    hideActions();
}

function actKong() {
    if (!G.humanCanAct) return;
    doKong(0, G.pendingAction.tile, G.pendingAction.from);
    hideActions();
}

function actWin() {
    if (!G.humanCanAct) return;
    if (G.pendingAction.type === 'self-win') {
        doWin(0, G.players[0].hand[G.players[0].hand.length - 1], 0, true, false);
    } else {
        doWin(0, G.pendingAction.tile, G.pendingAction.from, false, false);
    }
    hideActions();
}

function actSkip() {
    G.humanCanAct = false;
    hideActions();
    // 轮到下家
    startTurn((G.lastDiscard ? G.lastDiscard.from + 1 : G.cur + 1) % 4);
}

function showChowModal(options) {
    const c = document.getElementById('chow-opts');
    c.innerHTML = options.map((opt, i) =>
        `<div class="chow-opt" onclick="confirmChow(${i})">${opt.map(t => rTile(t)).join('')}</div>`
    ).join('');
    document.getElementById('chow-overlay').classList.add('show');
}

function confirmChow(idx) {
    document.getElementById('chow-overlay').classList.remove('show');
    doChow(0, G.pendingAction.tile, G.pendingAction.from, G.pendingAction.options[idx]);
    hideActions();
}

function cancelChow() {
    document.getElementById('chow-overlay').classList.remove('show');
    actSkip();
}

function onTileClick(idx) {
    if (G.gameOver || G.discardLocked) return;
    if (G.humanPhase !== 'select-discard' || G.cur !== 0) return;

    G.discardLocked = true;
    G.humanPhase = 'waiting';
    
    doDiscard(0, idx);
    hideActions();
}

function nextRound() {
    document.getElementById('win-overlay').classList.remove('show');
    document.getElementById('draw-overlay').classList.remove('show');
    if (G.lastWinner >= 0) G.dealer = G.lastWinner;
    G.round++;
    startRound();
}

function showWinOverlay(desc, changes) {
    document.getElementById('win-title').textContent = '🎉 胡牌！';
    document.getElementById('win-desc').textContent = desc;
    const el = document.getElementById('win-scores');
    el.innerHTML = Object.entries(changes).map(([i, sc]) => {
        const c = parseInt(sc);
        return `<div style="display:flex;justify-content:space-between;padding:0.2rem 1rem;border-bottom:1px solid #334155">
            <span>${NAMES[i]}</span><span style="color:${c >= 0 ? '#10b981' : '#ef4444'}">${sc}</span></div>`;
    }).join('');
    document.getElementById('win-overlay').classList.add('show');
}

// ==================== 渲染 ====================
function render() {
    document.getElementById('el-remain').textContent = G.wall.length;
    document.getElementById('el-round').textContent = G.round;

    // 出牌区
    const dc = document.getElementById('discards');
    dc.innerHTML = G.discards.slice(-24).map(t => rTile(t)).join('');
    document.getElementById('el-last').textContent = G.lastDiscard ?
        `最后: ${tStr(G.lastDiscard.tile)} (${NAMES[G.lastDiscard.from]})` : '';

    // 玩家
    for (let i = 0; i < 4; i++) {
        const p = G.players[i];
        const handEl = document.getElementById('h' + i);
        const meldEl = document.getElementById('m' + i);
        const areaEl = document.getElementById('p' + i);
        const badgeEl = document.getElementById('db' + i);
        const scoreEl = document.getElementById('s' + i);

        areaEl.classList.toggle('active', G.cur === i);
        badgeEl.style.display = (G.dealer === i) ? 'inline' : 'none';
        scoreEl.textContent = p.score;

        // 手牌
        if (i === 0) {
            handEl.innerHTML = p.hand.map((t, idx) =>
                rTile(t, idx === G.selectedIdx ? 'selected' : '')
            ).join('');
            handEl.querySelectorAll('.tile').forEach((el, idx) => {
                el.onclick = () => onTileClick(idx);
            });
        } else {
            handEl.innerHTML = p.hand.map(() => rTileFD()).join('');
        }

        // 碰/杠/吃
        meldEl.innerHTML = p.melds.map(m =>
            `<div class="meld-group">${m.tiles.map(t => rTile(t)).join('')}</div>`
        ).join('');
    }
}

// 自动开始
document.getElementById('start-screen').style.display = '';
</script>
