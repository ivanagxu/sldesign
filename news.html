<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Design - News</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SPNTNEW4GH"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-SPNTNEW4GH');
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== 复用主站样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ========== 导航栏 ========== */
        header {
            background-color: #8B4513;
            color: #F5DEB3;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px rgba(139, 69, 19, 0.2);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #DAA520;
        }

        .logo span {
            color: #F5DEB3;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 1.5rem;
        }

        nav ul li a {
            color: #F5DEB3;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 0.8rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        nav ul li a:hover,
        nav ul li a.active {
            background-color: #A0522D;
            color: #FFF8DC;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: #F5DEB3;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* ========== 页脚 ========== */
        footer {
            background-color: #8B4513;
            color: #F5DEB3;
            padding: 2rem 0;
            margin-top: 3rem;
        }

        .footer-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .footer-section h3 {
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            color: #DAA520;
            position: relative;
            padding-bottom: 0.5rem;
        }

        .footer-section h3:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 3px;
            background-color: #CD853F;
        }

        .contact-info {
            list-style: none;
        }

        .contact-info li {
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
        }

        .contact-info i {
            margin-right: 0.8rem;
            color: #DAA520;
            width: 20px;
        }

        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: #A0522D;
            color: #F5DEB3;
            border-radius: 50%;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-links a:hover {
            background-color: #CD853F;
            color: #8B4513;
            transform: translateY(-3px);
        }

        .copyright {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #A0522D;
            color: #DEB887;
            font-size: 0.9rem;
        }

        /* ========== 新闻页面专属样式 ========== */

        /* 页面标题 */
        .news-header {
            text-align: center;
            padding: 2rem 0 1.5rem;
        }

        .news-header h1 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .news-header h1 i {
            color: #DAA520;
            margin-right: 0.5rem;
        }

        .news-header p {
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        /* 分类筛选 */
        .category-filter {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 0.4rem 1.2rem;
            border: 2px solid #DAA520;
            border-radius: 20px;
            background: transparent;
            color: #DAA520;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover,
        .category-btn.active {
            background-color: #DAA520;
            color: white;
        }

        /* 新闻卡片容器 */
        .news-list {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 单条新闻卡片 */
        .news-card {
            background: white;
            border-radius: 10px;
            margin-bottom: 1.2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .news-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        /* 新闻卡片头部（始终可见） */
        .news-card-header {
            padding: 1.2rem 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .news-card-header:active {
            background-color: #faf5ef;
        }

        /* 分类标签 */
        .news-tag {
            flex-shrink: 0;
            padding: 0.2rem 0.7rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 0.1rem;
        }

        .news-tag.科技 {
            background-color: #e8f4fd;
            color: #2196F3;
        }

        .news-tag.金融 {
            background-color: #e8f5e9;
            color: #4CAF50;
        }

        .news-tag.综合 {
            background-color: #fff3e0;
            color: #FF9800;
        }

        /* 标题和日期 */
        .news-card-title {
            flex: 1;
        }

        .news-card-title h3 {
            font-size: 1.05rem;
            color: #2c3e50;
            margin-bottom: 0.3rem;
            line-height: 1.4;
        }

        .news-card-title .news-date {
            font-size: 0.8rem;
            color: #95a5a6;
        }

        .news-card-title .news-date i {
            margin-right: 0.3rem;
        }

        /* 展开/折叠箭头 */
        .news-toggle-icon {
            flex-shrink: 0;
            color: #bdc3c7;
            font-size: 0.9rem;
            transition: transform 0.3s ease;
            margin-top: 0.3rem;
        }

        .news-card.expanded .news-toggle-icon {
            transform: rotate(180deg);
        }

        /* 新闻正文（折叠区域） */
        .news-card-body {
            display: none;
            padding: 0 1.5rem 1.5rem;
            border-top: 1px solid #ecf0f1;
            animation: slideDown 0.3s ease;
        }

        .news-card.expanded .news-card-body {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 正文排版 */
        .news-card-body h1,
        .news-card-body h2,
        .news-card-body h3 {
            color: #2c3e50;
            margin: 1.2rem 0 0.6rem;
        }

        .news-card-body h1 { font-size: 1.4rem; }
        .news-card-body h2 { font-size: 1.2rem; border-bottom: 2px solid #DAA520; padding-bottom: 0.3rem; }
        .news-card-body h3 { font-size: 1.05rem; }

        .news-card-body p {
            margin-bottom: 0.8rem;
            color: #444;
        }

        .news-card-body ul,
        .news-card-body ol {
            margin: 0.8rem 0;
            padding-left: 1.5rem;
        }

        .news-card-body li {
            margin-bottom: 0.4rem;
        }

        .news-card-body strong {
            color: #2c3e50;
        }

        .news-card-body blockquote {
            border-left: 4px solid #DAA520;
            background-color: #faf5ef;
            padding: 0.8rem 1rem;
            margin: 1rem 0;
            border-radius: 0 6px 6px 0;
            color: #555;
            font-style: italic;
        }

        .news-card-body code {
            background-color: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }

        .news-card-body pre {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 1rem 0;
        }

        .news-card-body pre code {
            background: none;
            color: inherit;
        }

        .news-card-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .news-card-body th,
        .news-card-body td {
            border: 1px solid #ddd;
            padding: 0.6rem 0.8rem;
            text-align: left;
        }

        .news-card-body th {
            background-color: #faf5ef;
            color: #DAA520;
            font-weight: 600;
        }

        /* 加载更多提示 */
        .news-limit-hint {
            text-align: center;
            padding: 1rem;
            color: #95a5a6;
            font-size: 0.85rem;
        }

        /* 加载状态 */
        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: #95a5a6;
        }

        .loading-spinner i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
            color: #DAA520;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== 移动端响应式 ========== */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                align-items: flex-start;
            }

            .logo {
                margin-bottom: 1rem;
            }

            nav {
                width: 100%;
            }

            nav ul {
                flex-direction: column;
                width: 100%;
                display: none;
            }

            nav ul.show {
                display: flex;
            }

            nav ul li {
                margin: 0;
                width: 100%;
            }

            nav ul li a {
                display: block;
                padding: 0.8rem 0;
                border-bottom: 1px solid #A0522D;
            }

            .menu-toggle {
                display: block;
                position: absolute;
                top: 1rem;
                right: 20px;
            }

            .news-header h1 {
                font-size: 1.5rem;
            }

            .news-card-header {
                padding: 1rem;
                gap: 0.8rem;
            }

            .news-card-title h3 {
                font-size: 0.95rem;
            }

            .news-card-body {
                padding: 0 1rem 1rem;
            }

            .news-card-body h2 {
                font-size: 1.05rem;
            }

            .news-card-body table {
                font-size: 0.85rem;
            }

            .footer-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <div class="container nav-container">
            <a href="index.html" style="text-decoration:none;">
                <div class="logo">SL <span>DESIGN</span> PLATFORM</div>
            </a>
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
            <nav>
                <ul id="navMenu">
                    <li><a href="index.html"><i class="fas fa-home"></i> HOME</a></li>
                    <li><a href="index.html#exhibition"><i class="fas fa-images"></i> CASES</a></li>
                    <li><a href="news.html" class="active"><i class="fas fa-newspaper"></i> NEWS</a></li>
                    <li><a href="index.html#contact"><i class="fas fa-address-book"></i> CONTACT</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container">
        <div class="news-header">
            <h1><i class="fas fa-newspaper"></i> NEWS</h1>
            <p>精选金融与科技新闻 · 每周更新</p>
        </div>

        <!-- 分类筛选 -->
        <div class="category-filter">
            <button class="category-btn active" data-category="all">全部</button>
            <button class="category-btn" data-category="科技">科技</button>
            <button class="category-btn" data-category="金融">金融</button>
        </div>

        <!-- 新闻列表 -->
        <div class="news-list" id="newsList">
            <div class="loading-spinner" id="loadingSpinner">
                <i class="fas fa-spinner"></i>
                <p style="margin-top: 0.8rem;">加载中...</p>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer>
        <div class="container footer-container">
            <div class="footer-section">
                <h3>Contact</h3>
                <ul class="contact-info">
                    <li><i class="fas fa-map-marker-alt"></i> 1703 SOLO TAI KOK TSUI KLN HK</li>
                    <li><i class="fas fa-phone"></i><p style="color:white"> +852 96091469</p></li>
                    <li><i class="fas fa-envelope"></i> sindylau2010@gmail.com</li>
                    <li><i class="fas fa-clock"></i> Mon to Fri 9:00-18:00</li>
                </ul>
                <div class="social-links">
                    <a href="https://www.facebook.com/SLdesignPlus" target="_blank" rel="noopener noreferrer" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                </div>
            </div>
            <div class="footer-section">
                <h3>Quick Links</h3>
                <ul class="contact-info">
                    <li><a href="index.html" style="color:#F5DEB3;text-decoration:none;"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="news.html" style="color:#F5DEB3;text-decoration:none;"><i class="fas fa-newspaper"></i> News</a></li>
                </ul>
            </div>
        </div>
        <div class="copyright">
            &copy; 2025 SL Design Platform. All Rights Reserved.
        </div>
    </footer>

    <script>
    // ========== 移动端菜单 ==========
    document.getElementById('menuToggle').addEventListener('click', function() {
        document.getElementById('navMenu').classList.toggle('show');
    });

    // ========== 新闻加载与渲染 ==========
    const MAX_ARTICLES = 10;
    let allArticles = [];
    let currentCategory = 'all';

    // 加载新闻索引
    async function loadNews() {
        try {
            const resp = await fetch('news/news-index.json');
            if (!resp.ok) throw new Error('Failed to load news index');
            allArticles = await resp.json();
            renderNews();
        } catch (err) {
            console.error('News load error:', err);
            document.getElementById('newsList').innerHTML =
                '<p style="text-align:center;color:#95a5a6;padding:2rem;">新闻加载失败，请稍后重试</p>';
        }
    }

    // 渲染新闻列表
    function renderNews() {
        const container = document.getElementById('newsList');

        // 按分类筛选
        let filtered = currentCategory === 'all'
            ? allArticles
            : allArticles.filter(a => a.category === currentCategory);

        // 最多显示 10 篇
        const hasMore = filtered.length > MAX_ARTICLES;
        const visible = filtered.slice(0, MAX_ARTICLES);

        if (visible.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#95a5a6;padding:2rem;">暂无该分类的新闻</p>';
            return;
        }

        let html = '';
        visible.forEach((article, index) => {
            const isLatest = index === 0;
            const expandedClass = isLatest ? 'expanded' : '';

            html += `
                <div class="news-card ${expandedClass}" data-id="${article.id}">
                    <div class="news-card-header" onclick="toggleNews(this)">
                        <span class="news-tag ${article.category}">${article.category}</span>
                        <div class="news-card-title">
                            <h3>${escapeHtml(article.title)}</h3>
                            <span class="news-date"><i class="far fa-calendar-alt"></i> ${formatDate(article.date)}</span>
                        </div>
                        <i class="fas fa-chevron-down news-toggle-icon"></i>
                    </div>
                    <div class="news-card-body" id="body-${article.id}">
                        ${isLatest ? '<p style="color:#95a5a6;font-size:0.85rem;">正在加载正文...</p>' : ''}
                    </div>
                </div>
            `;
        });

        if (hasMore) {
            html += `<div class="news-limit-hint">仅展示最新 ${MAX_ARTICLES} 篇，共 ${filtered.length} 篇</div>`;
        }

        container.innerHTML = html;

        // 最新一篇自动加载正文
        if (visible.length > 0) {
            loadArticleBody(visible[0].id);
        }
    }

    // 切换展开/折叠
    async function toggleNews(header) {
        const card = header.closest('.news-card');
        const articleId = card.dataset.id;
        const body = document.getElementById(`body-${articleId}`);

        if (card.classList.contains('expanded')) {
            card.classList.remove('expanded');
        } else {
            card.classList.add('expanded');
            // 如果还没加载正文，则加载
            if (body.querySelector('p')?.textContent === '正在加载正文...') {
                await loadArticleBody(articleId);
            }
        }
    }

    // 加载单篇文章正文
    async function loadArticleBody(articleId) {
        const body = document.getElementById(`body-${articleId}`);
        if (!body) return;

        try {
            const resp = await fetch(`news/${articleId}.html`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const html = await resp.text();
            body.innerHTML = html;
        } catch (err) {
            console.error(`Failed to load article ${articleId}:`, err);
            body.innerHTML = '<p style="color:#e74c3c;">正文加载失败</p>';
        }
    }

    // 分类筛选
    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.dataset.category;
            renderNews();
        });
    });

    // 工具函数
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(dateStr) {
        const d = new Date(dateStr);
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}年${month}月${day}日`;
    }

    // 启动
    loadNews();
    </script>
</body>
</html>
